<script>
const DATA = [{"id": "bitcoin-vs-bsv", "question": "How is BSV different from Bitcoin (BTC)?", "category": "00-basics", "tags": ["basics", "bitcoin", "comparison"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "BTC and BSV started from the same place in 2009 and use similar core technology. Over time, disagreements split the community into separate networks ([[how-did-bsv-start]]), and the two now aim at different goals. BTC keeps its blocks — the batches payments are recorded in — deliberately small, and presents itself mainly as something to hold and store value in. BSV removes the limit on block size and presents itself as a network for very large numbers of payments and for data. They are different coins on different chains — you cannot send one to the other.", "detail": "The differences a beginner will actually notice:\n\n| | BTC | BSV |\n|---|---|---|\n| Main aim | A scarce digital asset; settling large amounts | Handling many payments and data at low cost |\n| Block size | Limited (about a few MB) | No fixed limit built into the rules ([[what-is-scaling]]) |\n| Typical fee | Changes with how busy the network is; can be dollars | Fractions of a cent ([[what-are-fees]]) |\n| Typical uses | Holding, large settlements | Very small payments, records stored on the chain, applications ([[data-on-chain]]) |\n\nBoth networks rely on the same kind of record-keeping work, called proof-of-work mining ([[what-is-mining]]). Both keep public records of payments ([[is-blockchain-anonymous]]). And both trace back to the same original design paper — which is why people argue over the name. Supporters of each chain say theirs best represents \"Bitcoin.\" This FAQ takes no side in that argument. We use the ticker names (BTC, BSV, BCH) because they are clear, and we describe what each network says it aims to do, without judging ([[how-did-bsv-start]]).\n\nOne practical warning follows from the two being separate networks: **always check which network you are using before you send.** Coins sent to an address on the wrong chain usually cannot be recovered.", "refs": ["data-on-chain", "how-did-bsv-start", "is-blockchain-anonymous", "what-are-fees", "what-is-mining", "what-is-scaling"], "gated": false}, {"id": "how-did-bsv-start", "question": "Where did BSV come from?", "category": "00-basics", "tags": ["basics", "history", "bitcoin"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "BSV appeared in November 2018, when a network called Bitcoin Cash split in two — a split known as a \"fork.\" Bitcoin Cash had itself split off from Bitcoin in 2017. Each split happened because people in the community disagreed about the rules the network should follow — mainly how large the batches of payments (blocks) should be, and how closely to stick to Bitcoin's original design. BSV's stated goal was to bring back that original design and grow it without limits.", "detail": "An open blockchain has no owner. So when its community disagrees deeply, the system can split. Both groups keep a copy of the shared history up to that moment. Then each carries on under its own rules, as a separate network. Anyone who held the original coin ends up with coins on both resulting chains.\n\nThat happened twice in BSV's history. In August 2017, Bitcoin split into BTC and Bitcoin Cash (BCH). That disagreement was about how to handle more payments. In November 2018, Bitcoin Cash split again, into BCH and BSV. That disagreement was about how far and how fast to grow, and whether to keep changing the rules or lock them close to the original design.\n\nThe chains have gone their own ways since. BTC, BCH, and BSV share their early history and similar technology, but they are different networks with different coins, different rules, and different communities ([[bitcoin-vs-bsv]]). \"BSV\" is commonly read as \"Bitcoin Satoshi Vision.\" That reflects the aim its supporters state: to build the design described in the original Bitcoin paper, with no limit on growth ([[what-is-scaling]]).\n\nThis FAQ describes what each network says it aims for, without ranking them. Which chain \"is the real Bitcoin\" is a position people hold, not a fact a neutral source can declare ([[bitcoin-vs-bsv]]).", "refs": ["bitcoin-vs-bsv", "what-is-scaling"], "gated": false}, {"id": "is-bsv-a-company", "question": "Is BSV a company?", "category": "00-basics", "tags": ["basics", "ecosystem"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "No. BSV is a public network, like the internet's email system — technology that many independent parties run and build on. There are companies that work *with* BSV — exchanges, wallet makers, app builders — and a Swiss non-profit association that looks after the system's rules. But no company owns BSV, issues it, or can switch it off.", "detail": "Keeping three groups apart clears up a whole family of common confusions:\n\n- **The network** is run by independent companies that process the transactions ([[who-runs-the-bsv-network]]), located in many countries. Anyone who meets the technical requirements can take part; no permission is needed.\n- **The BSV Association** ([[what-is-the-bsv-association]]) is a Swiss non-profit. It maintains the software that sets the network's rules and promotes the wider community of businesses building on BSV — a caretaker, not an owner ([[bsva-controls-bsv]]).\n- **Businesses** — the exchanges where BSV trades, wallet providers, app companies — are independent firms. They make their own commercial decisions and follow their own legal requirements ([[ecosystem-who-is-who]]).\n\nWhy does this matter? When one of these businesses has a problem — say an exchange fails to get a required license ([[orange-gateway-mica]]), or a wallet app shuts down — that is a company event, not a network event. The blockchain keeps running. Coins you hold with your own keys ([[custodial-vs-own-wallet]]) are unaffected ([[exchange-problems-mean-bsv-problems]]).", "refs": ["bsva-controls-bsv", "custodial-vs-own-wallet", "ecosystem-who-is-who", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-are-private-keys", "question": "What are private keys, and why do they matter so much?", "category": "00-basics", "tags": ["basics", "wallets", "security"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A private key is the secret code that controls coins on a blockchain. Think of it as the only key to a safe: whoever knows it can spend the coins — full stop. There is no \"forgot password\" button, and no administrator who can reset it. That makes your key both the source of your independence and the one thing that can undo everything if it goes wrong.", "detail": "Every blockchain address comes with a matching private key; the two are created as a pair. The address is like a mailbox slot — safe to share, because people use it to send coins *to* you. The private key is what approves payments going *out*. The network only checks that the approval is genuine, not who you are: a valid approval from the key is all the permission that exists.\n\nTwo things follow from this, and most beginner disasters trace back to forgetting one of them:\n\n1. **Lose the key, lose the coins.** No company — not an exchange, not a wallet maker, not the BSV Association — can recover coins when a key is lost ([[lost-keys-recovery]]).\n2. **Leak the key, lose the coins.** Anyone who sees it can spend your coins at once, and there is no undo. That is why no honest service will ever ask for your private key or recovery phrase. Such a request is the tell-tale sign of a scam ([[keeping-bsv-safe]]).\n\nMost wallets wrap your keys in a **recovery phrase** — a list of 12 or 24 ordinary words. That phrase *is* your keys, just in a form people can read. Guard it the same way: write it down, keep it offline, and never type it into a website or a \"support\" chat.", "refs": ["keeping-bsv-safe", "lost-keys-recovery"], "gated": false}, {"id": "what-is-a-blockchain", "question": "What is a blockchain, in plain words?", "category": "00-basics", "tags": ["basics", "technology"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A blockchain is a shared record book kept by many independent computers at the same time. Everyone sees the same entries. New entries are added in batches, called \"blocks.\" Once an entry is in, it is practically impossible to change without everyone noticing. That is the whole trick: a public record that no single party controls.", "detail": "Picture a book that records \"who paid whom, and when.\" Normally one institution — a bank, say — keeps that book, and you trust the institution. A blockchain shares the job out instead: thousands of computers each hold a full copy, and they follow shared rules to agree on every new entry.\n\nNew payments are gathered into a block. Each block is locked to the one before it — like pages that are numbered and sealed in order. That is the \"chain.\" Changing an old entry would break the seals, and every other participant would spot it at once. That is what keeps the record honest.\n\nAdding new blocks is the job of specialist operators ([[what-is-mining]]). They are paid in fees and in newly created coins for doing the work honestly. The result is a record that is public, can only be added to, and does not depend on trusting any single company. Everything else ([[what-is-bsv]], [[data-on-chain]]) is built on that.", "refs": ["data-on-chain", "what-is-bsv", "what-is-mining"], "gated": false}, {"id": "what-is-a-satoshi", "question": "What is a satoshi?", "category": "00-basics", "tags": ["basics", "units"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A satoshi is the smallest unit of BSV — one hundred-millionth of a coin. In other words, 1 BSV = 100,000,000 satoshis. Apps and fees are usually counted in satoshis, the way prices can be shown in cents instead of euros.", "detail": "The unit is named after Satoshi Nakamoto, the pen name of the unknown author of the original Bitcoin design that BSV grew out of ([[how-did-bsv-start]]).\n\nSatoshis matter more on BSV than on most blockchains, because fees are tiny ([[what-are-fees]]). A typical payment costs just a handful of satoshis — far below one cent. Such tiny amounts suit the things BSV is often used for: charging per use of an online service, per action in a game, or per kilobyte of data saved to the chain ([[data-on-chain]]).\n\nIn technical settings, amounts are almost always written as whole numbers of satoshis, not fractions of a BSV. Whole numbers avoid rounding mistakes — the same reason financial software counts in cents.", "refs": ["data-on-chain", "how-did-bsv-start", "what-are-fees"], "gated": false}, {"id": "what-is-a-wallet", "question": "What is a wallet?", "category": "00-basics", "tags": ["basics", "wallets"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A wallet is an app that holds the keys to your coins and lets you send and receive them. The coins themselves live on the blockchain — the shared public record. The wallet holds your private keys ([[what-are-private-keys]]): the secret codes that prove the coins are yours and let you spend them.", "detail": "The name is slightly misleading. A wallet does not hold coins the way a leather wallet holds cash. Your coins are entries in the public record. What the wallet app keeps safe is your keys — the secret codes that let you, and only you, move those entries.\n\nWallets come in two very different kinds, and the difference matters more than any list of features ([[custodial-vs-own-wallet]]):\n\n- **Self-custody wallets.** You hold the keys, on your own device. Nobody can freeze or move your coins — and nobody can help you if you lose the keys ([[lost-keys-recovery]]).\n- **Custodial services.** An exchange or app holds the keys for you, the way a bank holds your deposits. That is convenient. But your access depends on that company staying in business, properly licensed, and online ([[exchange-closes-my-funds]]).\n\nTwo practical basics: keep your recovery phrase written down, offline, and private ([[keeping-bsv-safe]]). And treat any request to \"verify\" that phrase as a scam — no honest service ever asks for it.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "keeping-bsv-safe", "lost-keys-recovery", "what-are-private-keys"], "gated": false}, {"id": "what-is-bsv", "question": "What is BSV?", "category": "00-basics", "tags": ["basics"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "BSV is digital money that works over the internet. You can use it to pay someone directly — like handing over cash, but online — and each payment costs less than a cent. It runs on a shared public record that no single company owns or controls.", "detail": "BSV is two things with the same name: the money itself, and the system that moves it.\n\nThe system is called a blockchain ([[what-is-a-blockchain]]). Think of it as a public record book of payments. Many independent companies keep identical copies of that book and update it together, so nobody can quietly change what's written in it, and no single company can switch it off.\n\nThe money is the coin you keep in a wallet ([[what-is-a-wallet]]) — an app on your phone or computer. Sending BSV is a bit like sending an email: it goes straight to the other person, you pay a tiny fee ([[what-are-fees]]), and there is no bank in the middle.\n\nBSV was built to handle very large numbers of payments at once, which is what keeps each payment cheap. Because payments are so cheap, businesses also use BSV to store records that must not be quietly altered — receipts, time stamps, delivery logs ([[data-on-chain]]).\n\nNo company owns BSV. Independent businesses process the payments ([[who-runs-the-bsv-network]]), and a Swiss non-profit, the BSV Association, looks after the system's rules ([[what-is-the-bsv-association]]).", "refs": ["data-on-chain", "what-are-fees", "what-is-a-blockchain", "what-is-a-wallet", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "custodial-vs-own-wallet", "question": "Keeping coins on an exchange vs. in my own wallet — what's the difference?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "exchanges"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "On an exchange, the company keeps the keys and owes you your balance — much like a bank account. In your own wallet, you keep the keys. Nobody can freeze, lose, or block your coins — and nobody can help you if you lose the keys. You are trading convenience against self-reliance. It is the single most important choice a holder makes.", "detail": "**When a company holds your coins for you (an exchange).** Your coins sit in the company's wallets. Your \"balance\" is their promise to pay you back. That promise is only as good as the company. If it is hacked, goes broke, freezes withdrawals, or cannot get or keep a licence it needs ([[orange-gateway-mica]]), your access depends on how that situation works out ([[exchange-closes-my-funds]]). In return, you get convenience — password recovery, trading, customer support.\n\n**When you hold your coins yourself.** The keys are on your own device, and the coins answer to you alone ([[what-are-private-keys]]). No company failure can touch them — the coins live on the blockchain, not with any business ([[is-bsv-a-company]]). The price is responsibility. Lose your recovery phrase and no one can restore your access ([[lost-keys-recovery]]). Get tricked by a scammer and no one can reverse the theft ([[keeping-bsv-safe]]).\n\nOne common pattern — we describe it here, we don't prescribe it: use an exchange only for the moment you swap between BSV and regular money, and hold the coins yourself the rest of the time. Whatever you choose, choose knowingly. \"Not your keys, not your coins\" is a simplification, but the uneven risk it points to is real.", "refs": ["exchange-closes-my-funds", "is-bsv-a-company", "keeping-bsv-safe", "lost-keys-recovery", "orange-gateway-mica", "what-are-private-keys"], "gated": false}, {"id": "keeping-bsv-safe", "question": "How do I keep my BSV safe?", "category": "10-using-bsv", "tags": ["using", "security", "scams"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Three habits cover most of the risk. First, guard your recovery phrase offline — never type it into websites, apps, or \"support\" chats. That request is always a scam. Second, check the address and the network before you send, because payments cannot be undone. Third, treat any investment offer or \"recovery\" offer you did not ask for as a scam until proven otherwise.", "detail": "Almost all losses come from tricksters, not from the system's locks failing. The same patterns come up again and again:\n\n- **Tricks to get your phrase.** Fake wallet updates, fake support agents, fake \"verify your wallet\" websites — anything that asks for your recovery phrase or private keys ([[what-are-private-keys]]). No honest company ever needs them. One rule with zero exceptions: the phrase goes into a wallet app you installed yourself, and nowhere else, ever.\n- **Sending to the wrong place.** Harmful software that secretly swaps the address you copied, addresses that look almost right, or the wrong network ([[sending-bsv-basics]]). Check a few characters at both ends of the address. When the amount matters, send a small test payment first.\n- **Offers that sound too good.** \"Guaranteed returns\", giveaways that promise to double your money, urgent insider tips. Blockchain payments cannot be undone, which makes them a scammer's favorite way to get paid — your skepticism is your refund policy.\n- **Recovery scams.** After any loss, \"recovery services\" appear. Coins lost with their keys cannot be recovered by anyone ([[lost-keys-recovery]]). Paying these services only adds a second loss.\n\nSome bigger choices also lower your risk. Keep any meaningful amount in your own wallet rather than on an exchange ([[custodial-vs-own-wallet]], [[exchange-closes-my-funds]]). Keep the recovery phrase on paper in two places. Use a separate device or a separate user account for large amounts.\n\nIf you are ever unsure whether something is genuine, the safe assumption is that it is not. Check through the official channel you already know — never through the channel that contacted you.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "lost-keys-recovery", "sending-bsv-basics", "what-are-private-keys"], "gated": false}, {"id": "lost-keys-recovery", "question": "I lost access to my wallet. Can my coins be recovered?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "recovery"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "It depends on what you lost. Lost the *device* but still have your recovery phrase? Yes — you can get everything back in any compatible wallet. Lost the *recovery phrase and keys* themselves? No. Nobody can recover coins you held yourself — not the wallet maker, not an exchange, not the BSV Association. Lost access to an *exchange account*? Contact the exchange. That works like getting back into any other online account.", "detail": "There are three different situations here. Let's untangle them:\n\n1. **Broken or lost phone, recovery phrase safe.** Your coins were never on the phone. They are on the blockchain, and your phrase recreates your keys ([[what-are-private-keys]]). Install a wallet on a new device, restore from the phrase, and you're done.\n2. **Recovery phrase and keys gone.** The coins stay visible in the public record forever, but nothing can move them without the keys. There is no back door. That missing override is exactly what makes holding your own coins trustworthy the rest of the time ([[custodial-vs-own-wallet]]). Anyone who claims they can \"recover\" such coins for a fee is running a scam — and this recovery-scam industry targets people in exactly your situation ([[keeping-bsv-safe]]).\n3. **Locked out of an exchange account.** Your balance there is an entry in the company's own records. Their support team can restore access to the *account* after checking your identity. That is a customer-service matter, not a blockchain one.\n\nPrevention beats all of this. Write the recovery phrase on paper (or metal), keep it in two safe places, and never photograph it or type it into anything online.", "refs": ["custodial-vs-own-wallet", "keeping-bsv-safe", "what-are-private-keys"], "gated": false}, {"id": "sending-bsv-basics", "question": "How do I send and receive BSV?", "category": "10-using-bsv", "tags": ["using", "wallets", "transactions"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "To receive: open your wallet and share the address or QR code it shows you. To send: paste or scan the other person's address, enter the amount, and confirm. The payment reaches them in seconds and costs a fraction of a cent. One rule matters most: check the address and the network before you confirm, because blockchain payments cannot be undone.", "detail": "Addresses are long on purpose, so that typing mistakes get caught. But an address that is wrong yet still valid will not be caught — for example, from a bad paste, or from harmful software that swaps what you copied. Good habits: scan QR codes instead of typing, check the first and last few characters after pasting, and send a small test amount first when the sum is significant.\n\n**Payments cannot be reversed.** That is how the system is meant to work, not a missing safety net. No company can pull back a confirmed payment ([[how-do-transactions-work]]). It is what makes the network trustworthy for the person receiving money — and unforgiving of a sender's mistakes.\n\n**Check the network.** BSV addresses look similar to those of related blockchains ([[bitcoin-vs-bsv]]). Sending BSV to an address on a different network typically loses the coins. Wallets and exchanges label the network — read the label.\n\nSome BSV wallets also let you pay a simple name instead of a long address, using standards such as Paymail. The same rule applies: check before you confirm.", "refs": ["bitcoin-vs-bsv", "how-do-transactions-work"], "gated": false}, {"id": "what-are-fees", "question": "What are transaction fees, and what do they cost on BSV?", "category": "10-using-bsv", "tags": ["using", "fees", "transactions"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A fee is a small amount you pay to the companies that process payments, so your payment gets written into the blockchain — a bit like postage on a letter. On BSV, a fee is typically a few satoshis ([[what-is-a-satoshi]]) — well under a cent. Fees stay low because the network's capacity grows with demand, instead of rationing limited space.", "detail": "Fees exist because processing payments costs real money — machines, internet capacity, electricity. The companies that gather payments into blocks ([[what-is-mining]]) are paid through these fees plus newly issued coins.\n\nWhy do fees differ so much between blockchains? It comes down to capacity ([[what-is-scaling]]). On a network where each block has a small fixed size, users compete for limited room, so fees rise when the network is busy. BSV removed that built-in size limit, so room stays plentiful and fees stay flat and tiny no matter how busy it gets. The trade-off: handling very large blocks takes industrial-scale equipment, a cost carried by the network's professional operators ([[who-runs-the-bsv-network]]).\n\nThe practical result is not just cheaper payments — it is a whole new set of things you can do. When a payment costs 1/100th of a cent, it becomes affordable to pay per article you read, per move in a game, or per record you save ([[data-on-chain]]). None of that is possible when each payment costs dollars.\n\nNo authority sets the fees. They are worked out in the open market between users and processors — the BSV Association does not set or collect them ([[what-bsva-does-not-do]]).", "refs": ["data-on-chain", "what-bsva-does-not-do", "what-is-a-satoshi", "what-is-mining", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "where-to-get-bsv", "question": "Where can I get BSV?", "category": "10-using-bsv", "tags": ["using", "exchanges"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "There are three common ways. You can buy BSV on a digital-asset exchange that lists it. You can receive it directly from another person or business — BSV is a payment network, so anyone can send it to your wallet. Or you can earn it by selling goods, services, or data in apps that accept BSV. Which exchanges you can use depends on your country and its rules.", "detail": "**Exchanges** are the usual way to buy BSV with regular money ([[what-is-an-exchange]]). What is available depends on where you live: an exchange must be licensed for the place you live in ([[why-do-licenses-matter]]), so the list differs between, say, the EU, the UK, and Asia. It also changes over time, as companies gain — or fail to gain — the licenses their markets require ([[orange-gateway-mica]]). Before you deposit money, check the exchange's approval status for your country. And remember: coins left on an exchange are held by that company, not by you ([[custodial-vs-own-wallet]]).\n\n**Receiving directly** needs no company in the middle at all. Install a wallet ([[what-is-a-wallet]]), share your address or QR code, and anyone can pay you — across borders, in seconds, for a fraction of a cent ([[sending-bsv-basics]]).\n\n**Earning** is increasingly common in BSV apps — small earnings for content, gaming, or data — because tiny payments are practical on this blockchain ([[what-are-fees]]).\n\nIn line with this FAQ's rules, we do not recommend specific companies or discuss whether you should buy at all ([[no-price-talk]]). This answer explains *how* access works — not *whether* or *where* you should buy.", "refs": ["custodial-vs-own-wallet", "no-price-talk", "orange-gateway-mica", "sending-bsv-basics", "what-are-fees", "what-is-a-wallet", "what-is-an-exchange", "why-do-licenses-matter"], "gated": false}, {"id": "exchange-closes-my-funds", "question": "An exchange holding my coins is closing. What should I do?", "category": "20-exchanges-access", "tags": ["exchanges", "security", "custody"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Follow the exchange's official instructions, and act promptly. Closures normally come with a set period for taking your coins out — Orange Gateway's 2026 notice gave customers 60 days ([[orange-gateway-mica]]). Move your coins to a wallet that only you control — like taking your money out of a locker and into your own pocket. Check the address and the network carefully before you send. And be very suspicious of anyone who contacts *you* about the closure — closures attract scammers.", "detail": "A practical order of steps:\n\n1. **Check the news at the source.** Go to the exchange's own website or its verified account — not screenshots or messages sent to you. Scammers use closure panic to set up fake \"fast withdrawal\" websites ([[keeping-bsv-safe]]).\n2. **Get your own wallet first,** if you do not have one. Install a reputable wallet app and keep a copy of its recovery phrase somewhere safe, offline ([[what-is-a-wallet]], [[custodial-vs-own-wallet]]).\n3. **Take your coins out within the window.** Check the address and the network before you confirm ([[sending-bsv-basics]]). Send a small test amount first. If you miss the window, your claim usually moves into a slower legal wind-down process.\n4. **Save your records** — your transaction history and statements — while you can still log in. You may need them for taxes or claims.\n\nWhy do closures happen? Often it is licensing. An exchange that is not granted a required authorization must stop serving that market ([[why-do-licenses-matter]], [[what-is-mica]]). An announced wind-down with a withdrawal window is an orderly process, with a clear path for customers. A sudden insolvency — a company collapse — is not. For anyone with money there, that is the practical difference between the two.\n\nOne thing worth repeating: when your coins sit on an exchange, that company holds them for you — which is exactly why this page exists. Coins already in your own wallet are untouched by anything that happens to any exchange ([[exchange-problems-mean-bsv-problems]]).", "refs": ["custodial-vs-own-wallet", "exchange-problems-mean-bsv-problems", "keeping-bsv-safe", "orange-gateway-mica", "sending-bsv-basics", "what-is-a-wallet", "what-is-mica", "why-do-licenses-matter"], "gated": false}, {"id": "what-are-on-off-ramps", "question": "What are 'on-ramps' and 'off-ramps'?", "category": "20-exchanges-access", "tags": ["exchanges", "basics", "fiat"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "An \"on-ramp\" is any service that turns regular money — euros, dollars, pounds, sometimes called \"fiat\" — into a digital coin. An \"off-ramp\" turns the coin back into regular money. Exchanges are the best-known ramps, but card-purchase services and payment companies play the same role. Ramps are the place where blockchains meet banks. That is why they face more regulation than any other part of this system.", "detail": "The blockchain itself has nothing to do with banks. Once you hold BSV, you can send and receive it without any ramp at all ([[sending-bsv-basics]]). Ramps only matter at the edges — turning your salary into coins, or coins into rent money.\n\nBecause that edge touches bank accounts and customer money, ramp companies carry the heaviest rulebook: identity checks, anti-money-laundering rules, and licenses for each place they operate ([[who-regulates-crypto]], [[why-do-licenses-matter]]). This is why the ramps available to you shift the most when the rules change. The European transition to the MiCA rules, which ended in July 2026, is the current example ([[what-is-mica]], [[orange-gateway-mica]]).\n\nIf a ramp you use disappears, the practical questions are answered in [[exchange-closes-my-funds]] and [[where-to-get-bsv]]. Coins already in a wallet that only you control are not affected. And you can keep buying and selling through whichever licensed services serve your region.", "refs": ["exchange-closes-my-funds", "orange-gateway-mica", "sending-bsv-basics", "what-is-mica", "where-to-get-bsv", "who-regulates-crypto", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-a-listing", "question": "What does it mean when a coin is 'listed' on an exchange?", "category": "20-exchanges-access", "tags": ["exchanges", "listings"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "A listing means an exchange has decided to offer that coin in its shop. If BSV is \"listed\", you can buy and sell it there — for example swapping euros or dollars for BSV. It is the exchange's own business decision. More listings simply mean more places where people can buy and sell; they say nothing about how good or bad the technology is.", "detail": "Think of an exchange as a shop that sells many different coins. Before putting a new coin on the shelf, the shop does some work: it connects the coin's technology to its systems (so deposits and withdrawals work), checks that offering it fits the rules it operates under, and makes sure there are always enough buyers and sellers for trading to run smoothly.\n\nThe decision to list is always the exchange's own. Companies in the BSV world can help with the practical side — answering technical questions, providing documentation — but they cannot make the decision for the exchange.\n\nRemoving a coin from the shelf is called delisting, and it is the same kind of business decision in reverse ([[why-do-exchanges-delist]]). Because listings come and go, the places where you can buy BSV change over time and differ by country ([[where-to-get-bsv]]).", "refs": ["where-to-get-bsv", "why-do-exchanges-delist"], "gated": false}, {"id": "what-is-an-exchange", "question": "What is a digital-asset exchange?", "category": "20-exchanges-access", "tags": ["exchanges", "basics"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "An exchange is a private company that runs a marketplace. People go there to swap digital coins for regular money, or for other coins. Think of a currency-exchange booth that also offers lockers. It is the usual doorway between the banking world and blockchains. But it is a business — with its own owners, rules, licenses, and risks. It is entirely separate from the blockchains whose coins it trades.", "detail": "An exchange does three things. It holds what customers deposit — money and coins — so the exchange holds your coins for you ([[custodial-vs-own-wallet]]). It matches people who want to buy with people who want to sell. And it connects to banks, so you can move regular money in and out ([[what-are-on-off-ramps]]).\n\nThat separateness is what newcomers most often miss. When an exchange offers BSV, that is a business choice made by that company ([[what-is-a-listing]]). When an exchange closes, that is a company event ([[exchange-closes-my-funds]], [[orange-gateway-mica]]). None of this changes the blockchain itself. It keeps running no matter which marketplace trades its coin ([[exchange-problems-mean-bsv-problems]]).\n\nBecause exchanges handle customer money, most countries treat them as regulated financial businesses ([[who-regulates-crypto]]). Licenses decide where an exchange may operate and which customers it may serve. That is why the places where you can get BSV differ by country and change over time ([[where-to-get-bsv]], [[why-do-licenses-matter]]).", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-listing", "where-to-get-bsv", "who-regulates-crypto", "why-do-licenses-matter"], "gated": false}, {"id": "why-do-exchanges-delist", "question": "Why do exchanges delist coins?", "category": "20-exchanges-access", "tags": ["exchanges", "listings", "regulation"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "For their own business or legal reasons. Maybe too few customers trade the coin to make it worth the upkeep. Maybe the rules in some country changed. Maybe the exchange simply changed direction. A delisting is the exchange deciding what to keep in its own shop — it does not switch the coin off, and you can still move your coins to your own wallet.", "detail": "The common reasons, across the whole industry:\n\n- **Money.** Every coin on the shelf costs the exchange staff time and upkeep. If very few people trade it, it may not pay its way.\n- **Rules.** An exchange's license limits what it may offer in each country ([[why-do-licenses-matter]]). When new rules arrive — like Europe's MiCA ([[what-is-mica]]) — exchanges re-check their shelves, and one without the required license has to stop serving those customers entirely ([[orange-gateway-mica]]).\n- **Caution.** Exchanges regularly review the coins they carry and drop ones they are no longer comfortable with, by their own standards.\n- **Business changes.** Partnerships and priorities shift, like in any industry.\n\nFor you as a holder, a delisting works like this: trading of that coin stops on that exchange, and the exchange announces a period during which you can withdraw your coins to your own wallet ([[exchange-closes-my-funds]]). The coin itself keeps working, and coins you hold in your own wallet are not affected ([[exchange-problems-mean-bsv-problems]]).\n\nBSV has been both delisted and newly listed by exchanges over the years. In each case, the exchange explained its own reasons — and those statements are the best source on why ([[ecosystem-who-is-who]]). The one constant: listing decisions belong to the exchanges themselves, not to the organizations around BSV ([[what-bsva-does-not-do]]).", "refs": ["ecosystem-who-is-who", "exchange-closes-my-funds", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-bsva-does-not-do", "what-is-mica", "why-do-licenses-matter"], "gated": false}, {"id": "does-regulation-affect-my-coins", "question": "Does regulation affect the coins I already hold?", "category": "30-regulation", "tags": ["regulation", "custody", "wallets"], "updated": "2026-07-06", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114"], "short": "Rules for crypto apply to companies and the services they sell — not to the blockchain, and not to coins you keep in your own wallet. What changes for you is the shops around you: which exchanges may serve your country, what identity checks you go through when you trade, and where you can swap coins for bank money. Coins in your own wallet stay yours, and you can still move them on the network, whatever the rules say.", "detail": "It helps to separate two layers.\n\n- **The network itself** — the blockchain, the payment processing, and your wallet app — runs worldwide, and it is not the thing licenses apply to ([[who-runs-the-bsv-network]], [[what-is-a-casp]]). A law like the EU's MiCA ([[what-is-mica]]) does not reach into the network.\n- **The businesses on top** — exchanges, companies that hold coins for customers, and services that swap coins for bank money — are what the rules do apply to ([[why-do-licenses-matter]]). When rules tighten, this layer visibly changes: some businesses get licensed, some leave ([[orange-gateway-mica]]), and customers move elsewhere.\n\nTwo practical points follow. First, coins you keep on an exchange are tied to how that company stands with its regulator. If the company is not granted a license, there is a withdrawal process for getting your coins out ([[exchange-closes-my-funds]]). Coins in your own wallet are not tied to any company ([[custodial-vs-own-wallet]]). Second, even if you hold your own coins, you still feel the rules at the edges. Turning coins into bank money goes through licensed businesses. And tax on what you hold or gain applies no matter who keeps the coins — the rules vary by country, and this FAQ does not give tax advice.\n\nOne thing to say plainly: keeping your own coins is not a way around the law. The law covers the companies in the middle. When you hold your own keys, there is simply no company in the middle for it to cover.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "orange-gateway-mica", "what-is-a-casp", "what-is-mica", "who-runs-the-bsv-network", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-a-casp", "question": "What is a CASP?", "category": "30-regulation", "tags": ["regulation", "mica", "eu"], "updated": "2026-07-06", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114"], "short": "CASP stands for \"crypto-asset service provider\". It is the EU's legal name, under the MiCA law, for a company that offers crypto services to customers. That covers running an exchange, keeping customers' coins for them, carrying out buy and sell orders, giving advice, or moving assets for clients. Think of it like a bureau de change: a business that handles other people's money needs a permit. If a company does these things for customers in the EU or the wider EEA (the EU plus Iceland, Liechtenstein, and Norway), it needs official permission — a CASP authorization.", "detail": "The label is about what a company *does*, not the technology it uses. A company becomes a CASP through the business it runs — keeping customers' coins for them ([[custodial-vs-own-wallet]]), running a trading venue ([[what-is-an-exchange]]), or swapping crypto for regular money ([[what-are-on-off-ramps]]) — no matter which blockchains it supports.\n\nGetting that permission works broadly like this: the financial watchdog in the company's country checks its financial reserves, how it is run, how it keeps customers' coins safe, and how it handles complaints. That watchdog is BaFin in Germany, the AMF in France, and — for Iceland, an EEA country that applies the EU's rules — the Central Bank of Iceland. Once granted, the license is valid across the whole EU/EEA. The watchdog can also say no, or later withdraw a license it has given — the situation Orange Gateway reported in 2026 ([[orange-gateway-mica]]).\n\nWhat is *not* a CASP matters too. Making wallet software without holding users' keys, running the blockchain's machinery ([[who-runs-the-bsv-network]]), or publishing about crypto are generally not activities that need this license. That is why the same event can close an exchange while the network — and people holding their own coins — carry on untouched ([[does-regulation-affect-my-coins]]).", "refs": ["custodial-vs-own-wallet", "does-regulation-affect-my-coins", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-an-exchange", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-mica", "question": "What is MiCA?", "category": "30-regulation", "tags": ["regulation", "mica", "eu"], "updated": "2026-07-06", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.lexology.com/library/detail.aspx?g=2d2bd8e1-5dfb-4674-bdd6-f53c4e7a5d1c", "https://www.coindesk.com/business/2026/06/29/mica-july-1-deadline-could-leave-10-million-crypto-users-searching-for-a-new-platform-in-the-eu"], "short": "MiCA (short for \"Markets in Crypto-Assets\") is the European Union's law for crypto businesses. Since it took full effect, companies that hold, trade, or manage customers' digital assets must have a license — putting them under rules similar in spirit to those for other financial services. The transition period ended on 1 July 2026. After that date, providers without a license had to stop serving customers in the EU/EEA.", "detail": "MiCA covers the *companies that provide services* — exchanges, businesses that hold coins for customers, and brokers; the law calls them CASPs ([[what-is-a-casp]]). It does not cover the blockchains themselves ([[does-regulation-affect-my-coins]]). Its stated aims are the familiar ones of financial rules: protecting customers' money, keeping trading fair, and making clear who is responsible. The rules are the same in every EU and EEA country — one rulebook for the whole bloc instead of a different one in each country. That is why an Icelandic exchange answers to it through Iceland's central bank ([[orange-gateway-mica]]).\n\nWhat matters day to day for you: a company needs a license from the financial authority in one member state, and that license then counts across the whole bloc. Existing businesses were given a transition period to get licensed. The final deadline of that period was 1 July 2026, and industry reporting around the deadline indicated that most European crypto firms had not yet obtained a license. That made mid-2026 a period of visible reshaping of the market, with some platforms winding down and users moving to licensed ones.\n\nFor BSV specifically, MiCA is neither for nor against any particular blockchain. It decides *which companies* may offer services in Europe — and so it shapes where Europeans can buy, sell, or keep their BSV with a company ([[where-to-get-bsv]], [[what-are-on-off-ramps]]).", "refs": ["does-regulation-affect-my-coins", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-casp", "where-to-get-bsv"], "gated": false}, {"id": "who-regulates-crypto", "question": "Who regulates crypto?", "category": "30-regulation", "tags": ["regulation", "licensing"], "updated": "2026-07-06", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.finma.ch/en/"], "short": "It depends on where the *company* serving you operates — there is no single worldwide crypto watchdog. In the EU/EEA, each country's financial authority applies the shared EU rulebook, called MiCA. In Switzerland it is FINMA. In the UK it is the FCA. In the US, several agencies share the job. The blockchain networks themselves are not licensed by anyone — the rules apply to businesses and what they do.", "detail": "The pattern is much the same everywhere, even where the details differ. Businesses that hold or move *other people's assets* — exchanges, companies that keep coins for customers, brokers, and services that swap coins for bank money ([[what-are-on-off-ramps]]) — need permission from the local financial watchdog. Nearly everywhere, they must also follow rules against money laundering.\n\nA quick map (as of mid-2026):\n\n- **EU/EEA**: one rulebook, MiCA ([[what-is-mica]]), applied by each country's own authority — BaFin (Germany), the AMF (France), the Central Bank of Iceland, and so on — with licenses valid across the whole bloc ([[what-is-a-casp]]).\n- **Switzerland**: FINMA watches over financial activities; crypto services fall under the existing financial-market laws rather than a separate crypto law.\n- **UK, Singapore, Japan, UAE and others**: their own sets of crypto rules, of varying scope, run by their financial authorities.\n- **US**: several federal and state bodies (SEC, CFTC, FinCEN, state regulators), with the lines between them still shifting.\n\nBecause a license is granted country by country, the same service can be available in one country and not in the one next door. That is the main reason \"where can I get BSV\" has no single global answer ([[where-to-get-bsv]]) — and why deadlines in the rules change which platforms are open to you ([[orange-gateway-mica]]).", "refs": ["orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-casp", "what-is-mica", "where-to-get-bsv"], "gated": false}, {"id": "why-do-licenses-matter", "question": "Why do licenses matter for crypto companies?", "category": "30-regulation", "tags": ["regulation", "licensing", "exchanges"], "updated": "2026-07-06", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.lexology.com/library/detail.aspx?g=2d2bd8e1-5dfb-4674-bdd6-f53c4e7a5d1c"], "short": "Because companies that hold other people's money are exactly where things have historically gone wrong. A license means a financial watchdog has examined the company's finances, how it is run, and how it keeps customers' assets — and keeps holding it to account afterwards. For you, \"licensed for my country\" is the closest thing to a basic safety check when choosing where to trade or where to leave your coins.", "detail": "What a license actually gives you as a customer, in plain terms: the company must hold money in reserve; it must keep customers' assets separate from its own money; it must be audited and report on itself; it must have a proper complaints procedure; and the watchdog has the power to step in. None of this makes a company failure impossible. It makes failures rarer and more orderly — an organised wind-down instead of a vanishing act ([[exchange-closes-my-funds]]).\n\nThe flip side: a company that cannot obtain a license must stop offering the regulated services in that market — however good or bad its product otherwise is. That is what drove the wave of European platform closures in mid-2026, after the MiCA deadline ([[what-is-mica]], [[orange-gateway-mica]]): one legal cut-off date, applied across the whole industry, no matter which coins a platform traded.\n\nTwo things keep expectations honest. Licenses belong to *companies*, so a license problem is a company event, not a blockchain event ([[does-regulation-affect-my-coins]]). And the rules cover services that hold things *for* you — coins in your own wallet involve no license, because no company is holding anything on your behalf ([[custodial-vs-own-wallet]]).", "refs": ["custodial-vs-own-wallet", "does-regulation-affect-my-coins", "exchange-closes-my-funds", "orange-gateway-mica", "what-is-mica"], "gated": false}, {"id": "ecosystem-who-is-who", "question": "Who's who in the BSV ecosystem?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "overview"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Three separate groups, easy to mix up: the **BSV Association** (a Swiss non-profit that looks after the technology's rules), the **independent businesses that process payments** on the network, and **independent companies** — exchanges, wallet makers, app builders, and news sites, each owned and run separately. When something happens in the news, knowing which group did it answers most \"why did this happen?\" questions.", "detail": "The map, and what each group actually decides:\n\n| Who | What they are | What they decide |\n|---|---|---|\n| BSV Association | A Swiss non-profit ([[what-is-the-bsv-association]]) | The software and rules of the system, standards, education — not how the network is run day to day ([[what-bsva-does-not-do]]) |\n| Payment processors | Independent businesses ([[who-runs-the-bsv-network]]) | Whether to take part, and what equipment to run |\n| Independent companies | Exchanges, wallets, apps, media | Their own products, what they list ([[what-is-a-listing]]), their own licenses ([[why-do-licenses-matter]]), what they publish |\n\nThe last row matters most. The exchanges that trade BSV, the wallets that hold it, and the websites that write about it — even the very enthusiastic ones — are all independent firms. What they say is their own opinion, and what happens to their business is their own story ([[orange-gateway-mica]]). None of them speaks for the technology or for the Association ([[exchange-problems-mean-bsv-problems]]).\n\nA useful habit when you read BSV news: first ask, \"which of these groups is this about?\" A story about one company — a closure, a dispute, a bold claim — is very different from a story about the system everyone shares ([[is-bsv-a-company]]).", "refs": ["exchange-problems-mean-bsv-problems", "is-bsv-a-company", "orange-gateway-mica", "what-bsva-does-not-do", "what-is-a-listing", "what-is-the-bsv-association", "who-runs-the-bsv-network", "why-do-licenses-matter"], "gated": false}, {"id": "how-is-bsv-developed", "question": "Who develops the BSV software, and can they change the rules?", "category": "40-ecosystem", "tags": ["ecosystem", "development", "governance"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "The BSV Association writes and maintains the main software that the network's payment processors run, and it keeps the technical rulebook. Its stated policy is to keep the basic rules stable — \"set in stone\" — rather than changing them over time. But writing the software is not the same as commanding the network: the independent businesses that run it choose for themselves whether to use any new version ([[who-runs-the-bsv-network]]).", "detail": "Think of it in three layers.\n\nThe **basic rules** — how payments work — are deliberately kept fixed. The idea: businesses can build on BSV for decades because the foundation doesn't move, much like the basic workings of the internet have stayed the same for decades while everything on top of them grew.\n\nThe **software** that follows those rules is built and maintained by the Association's teams and published openly for anyone to inspect ([[what-is-the-bsv-association]]).\n\nEverything **on top** — wallets, payment services, record-keeping tools — is built by many independent companies ([[ecosystem-who-is-who]]).\n\nOn \"can they change the rules\": the Association can propose a new software version, but the network decides. The independent processors only adopt versions that serve their interests — a change they reject simply would not run ([[bsva-controls-bsv]]). That choice, not any legal power, is how a public blockchain is actually governed. It is also how BSV itself came to exist as a separate coin ([[how-did-bsv-start]]).\n\nAnd building things that use BSV requires no one's permission — the software and its documentation are public ([[data-on-chain]]).", "refs": ["bsva-controls-bsv", "data-on-chain", "ecosystem-who-is-who", "how-did-bsv-start", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-bsva-does-not-do", "question": "What does the BSV Association NOT do?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "misconceptions"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "The Association does not run exchanges or decide what they list. It does not hold anyone's coins and cannot get lost coins back. It does not control the network and cannot undo a payment. It does not set fees or prices. And it does not hand out licenses — government regulators do that. When something goes wrong somewhere in the BSV world, people often blame the Association anyway — this page lists, plainly, what is and isn't in its hands.", "detail": "The concrete list:\n\n- **Exchanges.** The Association does not own or run any exchange, does not decide which exchange offers BSV ([[what-is-a-listing]], [[why-do-exchanges-delist]]), and has no say in whether an exchange gets its license — that is between the exchange and its regulator ([[orange-gateway-mica]], [[why-do-licenses-matter]]).\n- **Your coins.** It cannot see or touch anyone's wallet or exchange account, cannot freeze or recover money ([[lost-keys-recovery]]), and will never ask for your keys. Anyone asking for your keys in its name is a scammer ([[keeping-bsv-safe]]).\n- **The network.** Payments are processed by independent businesses ([[who-runs-the-bsv-network]]). The Association maintains the software those businesses may choose to use — that is influence, not control ([[bsva-controls-bsv]]). It cannot undo a payment or block anyone's address.\n- **Markets.** It does not set the fees ([[what-are-fees]]), does not trade, and does not comment on price — and neither does this FAQ ([[no-price-talk]]).\n- **Licenses.** It is not a regulator. It cannot give any company a license, and it cannot take one away ([[who-regulates-crypto]]).\n\nWhat it *does* do is look after the technology itself — the software, the standards, education, and spreading the word ([[what-is-the-bsv-association]]). That is real work, but it is a completely different job from the powers people often imagine it has.", "refs": ["bsva-controls-bsv", "keeping-bsv-safe", "lost-keys-recovery", "no-price-talk", "orange-gateway-mica", "what-are-fees", "what-is-a-listing", "what-is-the-bsv-association", "who-regulates-crypto", "who-runs-the-bsv-network", "why-do-exchanges-delist", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-the-bsv-association", "question": "What is the BSV Association?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "governance"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "The BSV Association (BSVA) is a non-profit based in Switzerland that looks after the BSV Blockchain. It maintains the software the network runs on, keeps the technical rulebook, teaches people how to use the technology, and promotes it. It is a caretaker, not an owner: it does not control the network, does not run exchanges, and does not hold anyone's coins.", "detail": "A shared system like BSV needs someone to do the shared housekeeping: keep the software up to date, write down the standards, help with security, and teach newcomers. For BSV, that job belongs to the Association — a non-profit based in Zug, Switzerland.\n\nWhat it does, concretely: it maintains and publishes the software that the payment-processing businesses run ([[how-is-bsv-developed]]); it keeps the technical rulebook; it runs education programs (including the BSV Academy); it supports projects building on BSV; and it speaks for the technology with institutions and governments.\n\nJust as important is what it is *not*: it does not run the network (independent businesses do — [[who-runs-the-bsv-network]]); it is not a financial company (it holds no customer money and runs no marketplace — [[what-bsva-does-not-do]]); and it does not control the blockchain ([[bsva-controls-bsv]]).\n\nWhy this matters to you: when something happens in the news — an exchange closes ([[orange-gateway-mica]]), an app shuts down — knowing what the Association actually does (and doesn't do) tells you what it could and couldn't have decided ([[ecosystem-who-is-who]]).", "refs": ["bsva-controls-bsv", "ecosystem-who-is-who", "how-is-bsv-developed", "orange-gateway-mica", "what-bsva-does-not-do", "who-runs-the-bsv-network"], "gated": false}, {"id": "who-runs-the-bsv-network", "question": "Who actually runs the BSV network?", "category": "40-ecosystem", "tags": ["ecosystem", "mining", "nodes"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Independent businesses, in various countries, run the BSV network. They operate the computers that check and record everyone's payments, and they earn fees and newly issued coins for that work. People often call them miners ([[what-is-mining]]). Anyone may join — no permission needed — and no single organization, including the BSV Association, runs the network itself.", "detail": "What these businesses do: they gather the payments people send, check that each one follows the rules, record them in the shared public record book ([[what-is-a-blockchain]]), and publish the result for everyone to see. They are paid for this work ([[what-are-fees]]).\n\nWhy you can trust the result: many of these businesses compete, and each keeps its own copy of the record book. If one tried to cheat its copy, everyone else's copies would disagree — so cheating gets a business nothing.\n\nThe wider picture divides neatly ([[ecosystem-who-is-who]]): these processors run the network; the BSV Association maintains the software most of them choose to use ([[what-is-the-bsv-association]], [[how-is-bsv-developed]]); and companies like exchanges and wallet apps build services on top ([[what-is-an-exchange]]). Each layer makes its own decisions — so \"who decided this?\" always has a specific answer, and it is rarely \"the network\" ([[what-bsva-does-not-do]]).\n\nYou don't have to take anyone's word that the network is running: its activity is public, and anyone can look at it live on viewing sites such as WhatsOnChain ([[is-bsv-dead]]).", "refs": ["ecosystem-who-is-who", "how-is-bsv-developed", "is-bsv-dead", "what-are-fees", "what-bsva-does-not-do", "what-is-a-blockchain", "what-is-an-exchange", "what-is-mining", "what-is-the-bsv-association"], "gated": false}, {"id": "data-on-chain", "question": "Can a blockchain store more than payments?", "category": "50-technology", "tags": ["technology", "data", "applications"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Yes. Payments on the BSV Blockchain can carry extra information, so the chain can also work as a public record book — for documents, sensor readings, game events, or delivery checkpoints. Each entry is stamped with a date and time, and nobody can quietly rewrite it later. This is practical on BSV because each entry costs a fraction of a cent ([[what-are-fees]]). On chains where one entry costs dollars, keeping records this way is too expensive.", "detail": "What the chain offers that an ordinary company database does not: proof of *when*, and proof that nothing changed. A record written into the chain is time-stamped by the whole network and cannot be quietly altered afterwards ([[what-is-a-blockchain]]). Anyone can check it without having to trust the person who wrote it ([[what-is-spv]]). A company's own database proves nothing to outsiders. A chain record does.\n\nCommon uses on BSV: proving a document existed unchanged on a certain date, keeping audit trails for regulators or supply chains, machines recording their own readings alongside tiny payments, and games or content where actions, ownership, and small earnings are recorded. Another common design keeps the bulk of the data elsewhere and stores only a small digital fingerprint of it on the chain, to prove it was never changed.\n\nHonest limits: whatever goes on the chain is public and permanent. Private material belongs elsewhere, with only its fingerprint on the chain ([[is-blockchain-anonymous]]). Writing costs money in proportion to how much you write, so cost still shapes what people record. And putting a claim on the chain does not make it *true* — it proves when it was recorded and that it hasn't changed, not that its contents were accurate.\n\nAnyone can build these kinds of applications without asking permission from anyone ([[how-is-bsv-developed]]).", "refs": ["how-is-bsv-developed", "is-blockchain-anonymous", "what-are-fees", "what-is-a-blockchain", "what-is-spv"], "gated": false}, {"id": "how-do-transactions-work", "question": "What happens when I send a transaction?", "category": "50-technology", "tags": ["technology", "transactions"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "Your wallet writes a short message — \"move this money to that person\" — and signs it with your secret key to prove it really came from you. It then sends the message out to the network. Independent companies check that the money is yours and hasn't been spent, accept the payment within seconds, and soon add it to the permanent public record. No bank sits in the middle.", "detail": "Step by step, in plain terms:\n\n1. **Prepare**: your wallet picks the money you will spend. Digital coins exist as separate pieces, like banknotes that can be any value. The wallet also works out any change to send back to you.\n2. **Sign**: your private key ([[what-are-private-keys]]) creates a signature. The signature proves you approved the payment — without ever revealing the key itself.\n3. **Send**: the wallet passes the payment to the companies that run the network ([[who-runs-the-bsv-network]]). They check the signature, check the money hasn't already been spent, and from then on treat it as spent. On BSV this takes seconds, which is why most sellers accept the payment at this point.\n4. **Record**: one of those companies writes the payment into the permanent record ([[what-is-mining]]). Each later addition buries it deeper, making it ever harder to undo. This is what \"confirmations\" count.\n\nTwo things follow from this design. **Payments are final**: nobody can undo a confirmed payment. That protects the person being paid, but it is unforgiving if you make a mistake ([[sending-bsv-basics]]). **Payments are public**: anyone can see them in the shared record ([[is-blockchain-anonymous]]) — you can even watch your own payment go through, live, on a public viewing website.", "refs": ["is-blockchain-anonymous", "sending-bsv-basics", "what-are-private-keys", "what-is-mining", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-mining", "question": "What is mining?", "category": "50-technology", "tags": ["technology", "mining", "proof-of-work"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "Mining is the work of adding everyone's payments to the BSV Blockchain's permanent record. Companies compete to bundle recent payments together and attach them to the record. Winning takes real, costly computing work. The winner is paid: the payment fees, plus a set amount of newly issued coins. That cost is what keeps the record safe — rewriting history would mean redoing all that work while everyone else keeps adding to the record.", "detail": "The computing work has no meaning in itself. Its point is to be expensive to do and instant to check. That turns electricity and machines into a kind of security deposit. Anyone wanting to change an old entry would have to redo its work *and* keep pace with everyone else adding new entries ([[what-is-a-blockchain]]) — a race that gets more hopeless with every addition. That is why a payment counts as more settled the longer it has been in the record ([[how-do-transactions-work]]).\n\nMining is a business, not a hobby. Large professional companies ([[who-runs-the-bsv-network]]) invest in machines and electricity. They earn the fees plus a set number of new coins for each bundle they add — and that number halves on a fixed schedule. So in the long run, fees must pay for the system. BSV plans for that openly: very many payments at tiny fees each ([[what-is-scaling]], [[what-are-fees]]), rather than a few payments at high fees.\n\nThe name is a little misleading — nothing is dug up. Mining is really payment processing with a built-in security deposit, and the new coins are released on a schedule, not treasure found.", "refs": ["how-do-transactions-work", "what-are-fees", "what-is-a-blockchain", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-scaling", "question": "What does 'scaling' mean, and what is BSV's approach?", "category": "50-technology", "tags": ["technology", "scaling", "blocks"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "\"Scaling\" means a payment system's ability to handle more and more payments as it grows. BSV's approach: payments are added to the record in bundles, and BSV puts no fixed limit on how big a bundle can be. Capacity grows with demand and with better computers, and fees stay tiny at any volume. Other chains cap the bundle size and send the extra traffic elsewhere. That disagreement is what created BSV in the first place.", "detail": "The trade-off is simple arithmetic. Bundles are added at a roughly steady rhythm, so the bundle size sets how many payments per second the system can handle. Keep bundles small and the system is light to run, but space runs short — when it's busy, users bid against each other and fees rise. Let bundles grow and there is room for everyone, so fees stay near zero ([[what-are-fees]]) — but handling big bundles takes serious equipment, so the network ends up run by professional data-center companies ([[who-runs-the-bsv-network]]).\n\nThat trade-off split the original Bitcoin community ([[how-did-bsv-start]]). BTC chose small bundles, with extra systems layered on top. BSV chose unlimited room on the chain itself, accepting professional infrastructure as the cost ([[bitcoin-vs-bsv]]). BSV's current engineering project, called Teranode, aims at capacity in the range of a million payments per second — enough for payment-network use and for record-keeping ([[data-on-chain]]).\n\nWhy this matters to an ordinary user: capacity decides what the chain is *for*. Chains where a payment costs dollars suit large, occasional transfers. Chains where a payment costs under a cent make tiny payments and everyday record-keeping affordable. Different tools — shaped by that one design choice.", "refs": ["bitcoin-vs-bsv", "data-on-chain", "how-did-bsv-start", "what-are-fees", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-spv", "question": "What is SPV, and why does it matter?", "category": "50-technology", "tags": ["technology", "spv", "verification"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "SPV (\"Simplified Payment Verification\") is the method that lets a wallet check a payment is real without downloading the blockchain's entire history. Think of it as checking your receipt without asking the whole bank to reopen its books. The wallet checks a small proof that the payment sits in the official record. That is what makes an ordinary phone wallet trustworthy on a chain whose full history is far too big for a phone — essential on a large chain like BSV.", "detail": "The problem SPV solves: a chain built for worldwide volume ([[what-is-scaling]]) grows enormous. If everyone had to store all of it, only data centers could take part. SPV, described in the original Bitcoin white paper, splits the jobs. The big processing companies keep the full record ([[who-runs-the-bsv-network]]). Everyone else checks only the payments that concern them.\n\nHow it works, roughly: each bundle of payments comes with a compact summary of everything inside it. A wallet keeps only a tiny running list of those summaries — a few kilobytes per day. Given a payment plus a short proof, the wallet can confirm the payment is genuinely part of the official record ([[what-is-a-blockchain]]). Faking such a proof would mean redoing the costly processing work that secures the whole chain ([[what-is-mining]]) — the same cost that protects everything else.\n\nThe practical payoff: payments checkable person to person in milliseconds, wallets that run on any device, and businesses that can accept these payments without running heavy equipment of their own. In BSV's design, SPV is not a compromise — it is how the original design meant everyday users to take part ([[how-do-transactions-work]]).", "refs": ["how-do-transactions-work", "what-is-a-blockchain", "what-is-mining", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "bsva-controls-bsv", "question": "Doesn't the BSV Association control BSV?", "category": "60-misconceptions", "tags": ["misconceptions", "bsva", "governance"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "No. The Association looks after BSV, but it does not control it — and the difference is one you can check. The Association writes and maintains the main software and the technical standards. But the network is run by independent companies, and each one chooses for itself whether to use any new version. Making software that others choose to run is influence through usefulness, not control through authority.", "detail": "It is easy to see why people think this. The Association is the most visible organization around BSV. It maintains the main software ([[how-is-bsv-developed]]), and it speaks publicly for the technology. Being visible can look like being in charge. A fair test is to ask what real control would allow:\n\n- Could it undo a payment, freeze someone's coins, or block an address? No. Nobody can do that — the system was built that way ([[how-do-transactions-work]], [[what-bsva-does-not-do]]).\n- Could it force the companies running the network to accept a software change? No. Those companies are independent businesses that use what works for them ([[who-runs-the-bsv-network]]). If they reject a new version, it simply doesn't run. Blockchain history shows what happens when these companies disagree — the network splits. BSV itself began that way ([[how-did-bsv-start]]).\n- Could it set the fees, or decide where BSV is traded? No. Fees come out of the open market ([[what-are-fees]]). Trading venues make their own decisions about what they list ([[what-is-a-listing]]).\n\nWhat the Association *can* do is real, but limited. It can guide the direction of the software, look after the standards, fund education, and encourage people to use BSV ([[what-is-the-bsv-association]]). Even its say over the software is narrowed by BSV's \"set in stone\" policy: a stated commitment to keep the basic rules stable rather than steer them.\n\nWhy does the difference matter? If people believe the Association controls BSV, they end up blaming it for things it cannot decide ([[orange-gateway-mica]], [[exchange-problems-mean-bsv-problems]]). They also miss who actually made a given decision ([[ecosystem-who-is-who]]).", "refs": ["ecosystem-who-is-who", "exchange-problems-mean-bsv-problems", "how-did-bsv-start", "how-do-transactions-work", "how-is-bsv-developed", "orange-gateway-mica", "what-are-fees", "what-bsva-does-not-do", "what-is-a-listing", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "exchange-problems-mean-bsv-problems", "question": "An exchange trading BSV failed. Doesn't that mean BSV failed?", "category": "60-misconceptions", "tags": ["misconceptions", "exchanges", "network"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "No. It means a company failed. An exchange is an independent business that trades many different assets ([[what-is-an-exchange]]). Its finances, its licenses, and its management are its own affair. The BSV Blockchain was running before that company listed it, and it keeps running after the company closes. The real effects are narrower: one fewer place to trade in some region, and losses for customers who kept money at that company. That is a lesson about where you keep your funds — not a verdict on the technology.", "detail": "The mix-up comes from treating two separate things as one ([[ecosystem-who-is-who]]). Exchanges are services built around the network. The network itself sits underneath them ([[is-bsv-a-company]]). Exchanges fail across the whole industry, for ordinary business reasons: running out of money, poor management, or licensing trouble ([[why-do-licenses-matter]]). In mid-2026, a European licensing deadline called MiCA caused a wave of such closures across Europe ([[what-is-mica]]). It affected platforms trading *all* kinds of assets. Venues trading BSV were among them ([[orange-gateway-mica]]).\n\nA simple comparison helps. When a bank fails, nobody concludes the euro stopped working. When a bookstore closes, books did not fail. It is the same here, with one extra point in the blockchain's favor: you can check for yourself, in real time, that the system kept running ([[is-bsv-dead]]).\n\nSuch a closure does have real effects, and it is fair to name them. Trading access in a region gets narrower until other companies fill the gap ([[where-to-get-bsv]]). Affected customers need to follow the steps for getting their money out ([[exchange-closes-my-funds]]). And everyone is reminded why it matters who holds your coins ([[custodial-vs-own-wallet]]). These consequences are real. None of them comes from the technology itself.", "refs": ["custodial-vs-own-wallet", "ecosystem-who-is-who", "exchange-closes-my-funds", "is-bsv-a-company", "is-bsv-dead", "orange-gateway-mica", "what-is-an-exchange", "what-is-mica", "where-to-get-bsv", "why-do-licenses-matter"], "gated": false}, {"id": "is-blockchain-anonymous", "question": "Are blockchain payments anonymous?", "category": "60-misconceptions", "tags": ["misconceptions", "privacy", "transactions"], "updated": "2026-07-06", "sources": ["https://bsvblockchain.org/"], "short": "No — in fact, closer to the opposite. Every BSV payment is public and permanent. The amounts, the addresses, and the timing can be seen by anyone, forever ([[how-do-transactions-work]]). What the public record leaves out is your *name* next to your address — until something connects the two. The accurate word is \"pseudonymous\": a bit like writing under a pen name. And that pen name gives thinner cover than most people expect.", "detail": "How does a name get connected to an address in practice? Licensed exchanges check your identity ([[why-do-licenses-matter]]). So when coins move between your verified account and your own addresses, anyone with lawful access to the exchange's records can connect the dots. Shops connect addresses to deliveries and invoices. And there is a whole mature industry that traces the public trail of payments on behalf of investigators. Every address you reuse builds up a visible history. One identification later, that becomes *your* visible history.\n\nThe practical rule for privacy is simple: treat anything you do on the blockchain as done in public. There are lawful ways to keep some privacy. You can use a fresh address for each payment. You can keep sensitive information off the blockchain, storing only a digital fingerprint of it there ([[data-on-chain]]). But the public record is not a hiding place, and investigators do make use of how traceable it is.\n\nBSV's stated position is to keep this openness rather than hide it. Being easy to audit, and fitting with regulation, are treated as goals of the system ([[what-is-bsv]]). Other blockchain projects make different choices about privacy. Describing that range is beyond what this FAQ covers.", "refs": ["data-on-chain", "how-do-transactions-work", "what-is-bsv", "why-do-licenses-matter"], "gated": false}, {"id": "is-bsv-dead", "question": "I read that BSV is dead. Is it?", "category": "60-misconceptions", "tags": ["misconceptions", "network"], "updated": "2026-07-06", "sources": ["https://whatsonchain.com/", "https://bsvblockchain.org/"], "short": "\"Dead\" is something you can check for yourself — so please check, rather than take anyone's word for it, including ours. The BSV Blockchain's activity is publicly visible, in real time, on viewing websites such as WhatsOnChain. There you can see its blocks — the bundles of payments the network adds continuously — and the payments flowing through it. The software is actively developed, and applications run on the network. Whether that level of use satisfies any given person is a matter of opinion. Whether the network is running is a fact you can confirm in one browser tab.", "detail": "When someone declares a blockchain \"dead,\" they usually mean one of four very different things. It helps to pull them apart:\n\n- **\"The network stopped.\"** For BSV this is false, and you can check it directly. The flow of blocks and payments is public ([[who-runs-the-bsv-network]]). This is the only meaning of \"dead\" that is purely a matter of fact.\n- **\"Fewer places trade it.\"** Sometimes true at a give
