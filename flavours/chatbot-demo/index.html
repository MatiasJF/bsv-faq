t pass. It changes by the minute while answers here carry dates and sources. It invites prediction, and predictions are advocacy in numeric clothing. And any source connected to an ecosystem — critic or supporter — has a conflict of interest the moment it frames price as opportunity or doom.\n\nWhat we cover instead, because these *are* factual: what fees cost and why ([[what-are-fees]]), how market access works — exchanges, listings, ramps ([[what-is-an-exchange]], [[what-are-on-off-ramps]]) — what regulation changes for users ([[does-regulation-affect-my-coins]]), and what's verifiable about network activity ([[is-bsv-dead]]).\n\nIf you're making a financial decision, the boring advice is the honest kind: use licensed venues for your jurisdiction ([[why-do-licenses-matter]]), understand custody before depositing ([[custodial-vs-own-wallet]]), treat guaranteed-return offers as scams ([[keeping-bsv-safe]]), and consult a qualified advisor where stakes warrant it.\n\nChatbots and branded versions built on this content inherit this rule as a condition of reuse: price questions get this rationale, not a forecast.", "refs": ["custodial-vs-own-wallet", "does-regulation-affect-my-coins", "ecosystem-who-is-who", "is-bsv-dead", "keeping-bsv-safe", "what-are-fees", "what-are-on-off-ramps", "what-is-an-exchange", "why-do-licenses-matter"], "gated": false}, {"id": "orange-gateway-mica", "question": "What happened to Orange Gateway?", "category": "70-incidents", "tags": ["exchanges", "regulation", "mica", "incidents"], "updated": "2026-07-03", "sources": ["https://x.com/orangegatewayx/status/2072026946754519108", "https://www.lexology.com/library/detail.aspx?g=2d2bd8e1-5dfb-4674-bdd6-f53c4e7a5d1c", "https://www.coindesk.com/business/2026/06/29/mica-july-1-deadline-could-leave-10-million-crypto-users-searching-for-a-new-platform-in-the-eu"], "short": "Orange Gateway, an independent Icelandic exchange known for its BSV/fiat trading, announced on 30 June 2026 that it was not granted a MiCA license by the Central Bank of Iceland. It suspended deposits and trading immediately and asked customers to withdraw all funds within 60 days. If its appeal fails, the company expects to close the platform permanently.", "detail": "In their own words: Orange Gateway stated that its application \"was not fully processed due to incomplete information,\" that it is appealing the decision, that deposits and trading are suspended with immediate effect, and that customers should withdraw all funds and digital assets within 60 days. If the appeal fails, the company expects to permanently discontinue the platform.\n\nThe timing follows the EU-wide rule change: under MiCA ([[what-is-mica]]), the transition period for crypto-asset service providers ended on 1 July 2026. From that date, any provider without a MiCA license must stop offering these services in the EU and the EEA (the European Economic Area — the EU plus Iceland, Liechtenstein, and Norway, which adopt the EU's market rules). Iceland participates through the EEA, which is why the Central Bank of Iceland decides Orange Gateway's authorization. Orange Gateway is far from alone — industry coverage around the deadline reported that a large majority of European crypto firms had not yet obtained a license, affecting millions of users across many platforms and many different cryptocurrencies.\n\nWhat this means in practice: Orange Gateway customers should follow the company's withdrawal instructions within the stated window ([[exchange-closes-my-funds]]). Coins held in your own wallet ([[custodial-vs-own-wallet]]) are not part of any exchange's wind-down, and the venues serving each region are covered in [[where-to-get-bsv]].\n\nWho decided what: the MiCA licensing decision was made by the regulator, the Central Bank of Iceland, about one company, Orange Gateway, which is responsible for its own regulatory compliance. Orange Gateway is independent — it is not owned or operated by any organization in the BSV ecosystem ([[ecosystem-who-is-who]], [[what-bsva-does-not-do]]).", "refs": ["custodial-vs-own-wallet", "ecosystem-who-is-who", "exchange-closes-my-funds", "what-bsva-does-not-do", "what-is-mica", "where-to-get-bsv"], "gated": false}];
const byId = Object.fromEntries(DATA.map(d => [d.id, d]));

/* ---------- retrieval ---------- */
const STOP = new Set(("a an and are as at be but by can could do does for from has have how i if in is it its "+
  "me my of on or so that the this to was we what when where which who why will with you your").split(" "));
const SYN = { btc:"bitcoin", coins:"coin", cost:"fees", costs:"fees", cheap:"fees", buy:"get",
  bought:"get", sell:"exchange", trade:"exchange", trading:"exchange", closed:"closes",
  shut:"closes", shutdown:"closes", licence:"license", licensed:"license", regulator:"regulates",
  regulators:"regulates", eu:"mica", europe:"mica", iceland:"orange", hacked:"safe", stolen:"safe",
  dead:"dead", scam:"misconception" };
const PRICE = /\b(price|prices|worth|invest|investment|investing|prediction|predictions|pump|moon|profit|profits|go up|going up)\b/i;

function tokens(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s-]/g, " ").split(/\s+/)
    .filter(t => t && !STOP.has(t)).map(t => SYN[t] || t);
}
DATA.forEach(d => {
  d._q = tokens(d.question);
  d._t = d.tags.map(t => t.toLowerCase());
  d._s = tokens(d.short);
  d._b = tokens(d.detail);
});

function search(query) {
  if (PRICE.test(query) && byId["no-price-talk"]) {
    return { top: byId["no-price-talk"], others: [] };
  }
  const qt = tokens(query);
  if (!qt.length) return { top: null, others: [] };
  const scored = DATA.map(d => {
    let s = 0;
    for (const t of qt) {
      if (d._q.includes(t)) s += 4;
      if (d._t.some(tag => tag.includes(t))) s += 3;
      if (d._s.includes(t)) s += 2;
      else if (d._b.includes(t)) s += 1;
      if (d.id.includes(t)) s += 2;
    }
    const ql = query.toLowerCase().replace(/[?.!]/g, "").trim();
    if (ql && d.question.toLowerCase().includes(ql)) s += 8;
    return [s, d];
  }).filter(([s]) => s > 0).sort((a, b) => b[0] - a[0]);
  if (!scored.length || scored[0][0] < 4) return { top: null, others: scored.slice(0, 3).map(x => x[1]) };
  return { top: scored[0][1], others: scored.slice(1, 4).map(x => x[1]) };
}

/* ---------- minimal markdown ---------- */
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function inline(s) {
  return s
    .replace(/\[\[([\w-]+)\]\]/g, (_, id) =>
      byId[id] ? `<button class="chip" data-ask="${id}">${esc(byId[id].question)}</button>` : "")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\[(.+?)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function md(text) {
  const blocks = text.split(/\n\n+/);
  return blocks.map(b => {
    const lines = b.split("\n");
    if (lines.every(l => l.trim().startsWith("- "))) {
      return "<ul>" + lines.map(l => "<li>" + inline(esc(l.trim().slice(2))) + "</li>").join("") + "</ul>";
    }
    if (b.startsWith("### ")) return "<p><strong>" + inline(esc(b.slice(4))) + "</strong></p>";
    return "<p>" + inline(esc(b)) + "</p>";
  }).join("");
}

/* ---------- chat ---------- */
const chat = document.getElementById("chat");
function addRow(cls, html) {
  const row = document.createElement("div");
  row.className = "row " + cls;
  row.innerHTML = `<div class="bubble">${html}</div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function chipRow(docs, label) {
  if (!docs.length) return "";
  const chips = docs.map(d => `<button class="chip" data-ask="${d.id}">${esc(d.question)}</button>`).join("");
  return `<div class="meta">${label}</div><div class="chips">${chips}</div>`;
}

function answer(doc, others) {
  const gated = doc.gated ? '<span class="badge">internal — publication-gated</span>' : "";
  let html = `<h3>${esc(doc.question)}${gated}</h3><p>${inline(esc(doc.short))}</p>`;
  if (doc.detail) html += `<details><summary>More detail</summary>${md(doc.detail)}</details>`;
  if (doc.sources.length) {
    html += `<div class="srcs"><div>Sources</div>` + doc.sources.map(s => {
      const m = s.match(/^https?:/) ? `<a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a>` : esc(s);
      return `<div>· ${m}</div>`;
    }).join("") + `</div>`;
  }
  html += `<div class="meta">As of ${esc(doc.updated)} · category ${esc(doc.category)}</div>`;
  const related = doc.refs.map(id => byId[id]).filter(Boolean)
    .concat(others).filter((d, i, a) => d.id !== doc.id && a.findIndex(x => x.id === d.id) === i).slice(0, 3);
  html += chipRow(related, "Related");
  addRow("bot", html);
}

function noAnswer(near) {
  let html = `<p>I don't have a vetted answer for that yet — and this bot only answers from the reviewed FAQ, so I won't improvise.</p>`;
  html += chipRow(near.length ? near : pick(3), near.length ? "Closest matches" : "You could try");
  addRow("bot", html);
}

function pick(n) {
  const ids = ["what-is-bsv", "exchange-closes-my-funds", "what-is-mica", "what-is-the-bsv-association",
               "keeping-bsv-safe", "orange-gateway-mica"];
  return ids.map(id => byId[id]).filter(Boolean).slice(0, n);
}

function ask(text) {
  addRow("user", esc(text));
  const { top, others } = search(text);
  setTimeout(() => { top ? answer(top, others) : noAnswer(others); }, 120);
}

document.getElementById("form").addEventListener("submit", e => {
  e.preventDefault();
  const q = document.getElementById("q");
  if (q.value.trim()) ask(q.value.trim());
  q.value = "";
});
chat.addEventListener("click", e => {
  const id = e.target.dataset && e.target.dataset.ask;
  if (id && byId[id]) ask(byId[id].question);
});

/* greeting */
addRow("bot",
  `<p><strong>Hi — I answer questions about BSV in plain language.</strong> ` +
  `Every answer is quoted verbatim from a reviewed FAQ (${DATA.length} answers, with sources). ` +
  `If something isn't covered, I'll say so rather than guess. I don't discuss price.</p>` +
  chipRow(pick(4), "Try one of these"));
</script>
