<style>
  :root {
    --bg: #f4f5f8; --panel: #ffffff; --ink: #22242a; --muted: #6b6f7a;

    background: var(--panel); border-bottom: 1px solid var(--border);

  form {

<script>
const DATA = [{"id": "bitcoin-vs-bsv", "question": "How is BSV different from Bitcoin (BTC)?", "category": "00-basics", "tags": ["basics", "bitcoin", "comparison"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "BTC and BSV share the same 2009 origin and similar core technology, but became separate networks through community splits ([[how-did-bsv-start]]) and now pursue different designs. BTC keeps blocks — the batches transactions are recorded in — deliberately small and positions itself mainly as a store of value; BSV removes the limit on block size and positions itself as a high-volume payments and data network. They are different coins on different chains — one cannot be sent to the other.", "detail": "The practical differences a beginner will actually notice:\n\n| | BTC | BSV |\n|---|---|---|\n| Design priority | Digital scarcity, settlement layer | High-throughput payments and data |\n| Block size | Limited (~a few MB) | No protocol-fixed limit ([[what-is-scaling]]) |\n| Typical fee | Varies with congestion, can be dollars | Fractions of a cent ([[what-are-fees]]) |\n| Typical uses | Holding, large settlements | Micropayments, on-chain data, applications ([[data-on-chain]]) |\n\nBoth use proof-of-work mining ([[what-is-mining]]), both have public ledgers ([[is-blockchain-anonymous]]), and both descend from the same white paper — which is why the naming argument exists. Proponents of each chain claim theirs best represents \"Bitcoin.\" This FAQ takes no side in that argument: we use the ticker names (BTC, BSV, BCH) because they are unambiguous, and we describe each network's stated goals rather than judging them ([[how-did-bsv-start]]).\n\nOne operational warning that follows from them being separate networks: **always check which network you're using before sending.** Coins sent to an address on the wrong chain are typically unrecoverable.", "refs": ["data-on-chain", "how-did-bsv-start", "is-blockchain-anonymous", "what-are-fees", "what-is-mining", "what-is-scaling"], "gated": false}, {"id": "how-did-bsv-start", "question": "Where did BSV come from?", "category": "00-basics", "tags": ["basics", "history", "bitcoin"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "BSV emerged in November 2018 from a split (\"fork\") of Bitcoin Cash, which had itself split from Bitcoin in 2017. Each split happened because participants disagreed about the rules the network should follow — mainly how large blocks should be and how closely to keep to the original Bitcoin protocol. BSV's stated goal was to restore the original protocol design and scale it without limits.", "detail": "Open blockchains have no owner, so when their communities disagree fundamentally, the software can split: both groups keep a copy of the shared history up to that moment, then continue under different rules as separate networks. Holders of the original coin end up with coins on both resulting chains.\n\nThat happened twice in BSV's lineage. In August 2017, Bitcoin split into BTC and Bitcoin Cash (BCH) over how to increase transaction capacity. In November 2018, Bitcoin Cash split again into BCH and BSV over how far and how fast to scale, and over whether to keep modifying the protocol or lock it close to the original design.\n\nThe chains have developed separately since. BTC, BCH, and BSV share early history and similar technology but are different networks with different coins, different rules, and different communities ([[bitcoin-vs-bsv]]). \"BSV\" is commonly read as \"Bitcoin Satoshi Vision,\" reflecting the aim its supporters state: implementing the design described in the original Bitcoin white paper, with unbounded scaling ([[what-is-scaling]]).\n\nThis FAQ describes each network's stated goals without ranking them — which chain \"is the real Bitcoin\" is a position people hold, not a fact a neutral source can declare ([[bitcoin-vs-bsv]]).", "refs": ["bitcoin-vs-bsv", "what-is-scaling"], "gated": false}, {"id": "is-bsv-a-company", "question": "Is BSV a company?", "category": "00-basics", "tags": ["basics", "ecosystem"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "No. BSV is a public network, like the internet's email system — technology that many independent parties run and build on. There are companies *in* the ecosystem (exchanges, wallet makers, app builders) and a Swiss non-profit association that stewards the protocol, but no company owns BSV, issues it, or can shut it down.", "detail": "This distinction resolves a whole family of common confusions, so it's worth making precise:\n\n- **The network** is run by independent transaction processors ([[who-runs-the-bsv-network]]) located in many countries. Anyone meeting the technical requirements can participate; no permission is needed.\n- **The BSV Association** ([[what-is-the-bsv-association]]) is a Swiss non-profit that maintains the protocol software and promotes the ecosystem — a steward, not an owner ([[bsva-controls-bsv]]).\n- **Businesses** — exchanges like the ones where BSV trades, wallet providers, application companies — are independent firms making their own commercial and compliance decisions ([[ecosystem-who-is-who]]).\n\nWhy it matters: when a business in the ecosystem has a problem — an exchange fails to obtain a required license ([[orange-gateway-mica]]), a wallet app shuts down — that is a company event, not a network event. The blockchain keeps operating, and coins in self-custody ([[custodial-vs-own-wallet]]) are unaffected ([[exchange-problems-mean-bsv-problems]]).", "refs": ["bsva-controls-bsv", "custodial-vs-own-wallet", "ecosystem-who-is-who", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-are-private-keys", "question": "What are private keys, and why do they matter so much?", "category": "00-basics", "tags": ["basics", "wallets", "security"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A private key is the secret that controls coins on a blockchain — whoever knows the key can spend the coins, full stop. There is no \"forgot password\" flow and no administrator who can reset it. That makes keys both the source of your independence and your single point of failure.", "detail": "Every blockchain address has a matching private key, generated as a pair. The address is shareable — people send coins *to* it. The private key signs transactions *from* it. The network checks the signature math, not your identity: a valid signature is all the authorization that exists.\n\nTwo consequences follow, and most beginner disasters trace back to forgetting one of them:\n\n1. **Lose the key, lose the coins.** No company, including any exchange, wallet vendor, or the BSV Association, can recover coins for a lost key ([[lost-keys-recovery]]).\n2. **Leak the key, lose the coins.** Anyone who sees it can spend immediately and irreversibly. This is why no legitimate service ever asks for your private key or recovery phrase — such a request is the defining mark of a scam ([[keeping-bsv-safe]]).\n\nMost wallets wrap your keys in a **recovery phrase** (12 or 24 ordinary words). The phrase *is* the keys in human-friendly form — guard it accordingly: written down, offline, never typed into websites or \"support\" chats.", "refs": ["keeping-bsv-safe", "lost-keys-recovery"], "gated": false}, {"id": "what-is-a-blockchain", "question": "What is a blockchain, in plain words?", "category": "00-basics", "tags": ["basics", "technology"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A blockchain is a shared record book kept by many independent computers at the same time. Everyone sees the same entries, new entries are added in batches (\"blocks\"), and once added, entries are practically impossible to alter without everyone noticing. That's the whole trick: a public record no single party controls.", "detail": "Think of a ledger — a book of \"who paid whom, when.\" Normally one institution keeps it, and you trust that institution. A blockchain distributes that job: thousands of computers each hold a full copy, and they follow shared rules to agree on every new entry.\n\nNew transactions are collected into a block, and each block is cryptographically linked to the previous one — hence \"chain.\" Changing an old entry would break the links and be immediately obvious to every other participant, which is what makes the record tamper-evident.\n\nAdding blocks is the job of specialized operators ([[what-is-mining]]) who are paid in fees and newly issued coins for doing the work honestly. The result is a record that is public, append-only, and not dependent on trusting any single company — the property everything else ([[what-is-bsv]], [[data-on-chain]]) builds on.", "refs": ["data-on-chain", "what-is-bsv", "what-is-mining"], "gated": false}, {"id": "what-is-a-satoshi", "question": "What is a satoshi?", "category": "00-basics", "tags": ["basics", "units"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A satoshi is the smallest unit of BSV: one hundred-millionth of a coin (1 BSV = 100,000,000 satoshis). Applications and fees are usually denominated in satoshis, the way prices can be quoted in cents instead of euros.", "detail": "The unit is named after Satoshi Nakamoto, the pseudonymous author of the original Bitcoin design that BSV descends from ([[how-did-bsv-start]]).\n\nSatoshis matter on BSV more than on most blockchains because fees are tiny ([[what-are-fees]]) — a typical transaction costs a handful of satoshis, far below one cent. Micro-amounts are the natural unit for the things BSV is often used for: paying per API call, per game action, or per kilobyte of data written to the chain ([[data-on-chain]]).\n\nIn code and technical documents you'll almost always see integer satoshis rather than decimal BSV — it avoids rounding errors, the same reason financial software counts cents.", "refs": ["data-on-chain", "how-did-bsv-start", "what-are-fees"], "gated": false}, {"id": "what-is-a-wallet", "question": "What is a wallet?", "category": "00-basics", "tags": ["basics", "wallets"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A wallet is an app that holds the keys to your coins and lets you send and receive them. The coins themselves live on the blockchain; the wallet holds the private keys ([[what-are-private-keys]]) that prove they're yours and authorize spending them.", "detail": "The name misleads slightly: a wallet doesn't contain coins the way a leather wallet contains cash. Your coins are entries on the public blockchain. What the wallet stores is your keys — the secret codes that let you, and only you, move those entries.\n\nWallets come in two fundamentally different kinds, and the difference matters more than any feature list ([[custodial-vs-own-wallet]]):\n\n- **Self-custody wallets** — you hold the keys on your own device. Nobody can freeze or move your coins, and nobody can help you if you lose the keys ([[lost-keys-recovery]]).\n- **Custodial services** — an exchange or app holds the keys for you, like a bank holds deposits. Convenient, but your access depends on that company staying solvent, licensed, and online ([[exchange-closes-my-funds]]).\n\nPractical basics: keep your recovery phrase offline and private ([[keeping-bsv-safe]]), and treat any request to \"verify\" it as a scam — no legitimate service ever asks for it.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "keeping-bsv-safe", "lost-keys-recovery", "what-are-private-keys"], "gated": false}, {"id": "what-is-bsv", "question": "What is BSV?", "category": "00-basics", "tags": ["basics"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "BSV is a public blockchain — a shared digital ledger that anyone can use to send payments and record data. It is designed around large capacity and very low fees, so it can handle high volumes of small transactions. \"BSV\" names both the blockchain and the digital coin used to pay for transactions on it.", "detail": "A blockchain ([[what-is-a-blockchain]]) is a record of transactions kept by many independent computers at once, so no single company controls it or can quietly rewrite it. BSV is one such network. Its distinguishing design choice is scale: blocks (the batches transactions are grouped into) can be very large, which keeps the cost of a single transaction at a fraction of a cent.\n\nBecause transactions are cheap, BSV is used for more than moving money: applications also record data on the chain — receipts, timestamps, supply-chain records, gaming events — anything that benefits from a public, tamper-evident log ([[data-on-chain]]).\n\nThe coin itself is the network's built-in unit of payment. You hold it in a wallet ([[what-is-a-wallet]]) and spend tiny amounts of it as fees ([[what-are-fees]]) when you transact.\n\nNo company owns the BSV network. Independent operators run the machines that process transactions ([[who-runs-the-bsv-network]]), and a Swiss non-profit, the BSV Association, stewards the protocol ([[what-is-the-bsv-association]]).", "refs": ["data-on-chain", "what-are-fees", "what-is-a-blockchain", "what-is-a-wallet", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "custodial-vs-own-wallet", "question": "Keeping coins on an exchange vs. in my own wallet — what's the difference?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "exchanges"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "On an exchange, the company holds the keys and owes you a balance — like a bank account. In your own wallet, you hold the keys and nobody can freeze, lose, or block your coins — and nobody can help you if you lose the keys. The trade is convenience against self-reliance, and it's the single most consequential choice a holder makes.", "detail": "**Custodial (exchange) holding** means your coins sit in the company's wallets and your \"balance\" is their promise to pay you back. That promise is only as good as the company: if it is hacked, becomes insolvent, freezes withdrawals, or cannot obtain or keep a required license ([[orange-gateway-mica]]), your access depends on how that situation resolves ([[exchange-closes-my-funds]]). In exchange you get convenience — password recovery, trading, customer support.\n\n**Self-custody** means the keys are on your device and the coins answer to you alone ([[what-are-private-keys]]). No company failure can touch them — the coins live on the blockchain, not with any business ([[is-bsv-a-company]]). The price is responsibility: lose your recovery phrase and no one can restore access ([[lost-keys-recovery]]); get phished and no one can reverse the theft ([[keeping-bsv-safe]]).\n\nA common practical pattern — described here, not prescribed: use custodial services for the moment of exchange between BSV and regular money, and self-custody for holding. Whatever you choose, choose knowingly: \"not your keys, not your coins\" is an oversimplification, but the risk asymmetry it points at is real.", "refs": ["exchange-closes-my-funds", "is-bsv-a-company", "keeping-bsv-safe", "lost-keys-recovery", "orange-gateway-mica", "what-are-private-keys"], "gated": false}, {"id": "keeping-bsv-safe", "question": "How do I keep my BSV safe?", "category": "10-using-bsv", "tags": ["using", "security", "scams"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Three habits cover most of the risk: guard your recovery phrase offline (never type it into websites, apps, or \"support\" chats — that request is always a scam), verify addresses and networks before sending (payments are irreversible), and treat unsolicited investment or \"recovery\" offers as hostile by default.", "detail": "Almost all losses come from people, not from broken cryptography. The recurring patterns:\n\n- **Phrase phishing.** Fake wallet updates, fake support agents, fake \"validation\" sites — anything that asks for your recovery phrase or private keys ([[what-are-private-keys]]). No legitimate party ever needs them. Rule with zero exceptions: the phrase goes into a wallet app you installed yourself, and nowhere else, ever.\n- **Send-to-wrong-place.** Clipboard-swapping malware, look-alike addresses, wrong network ([[sending-bsv-basics]]). Verify a few characters at both ends; send a test amount when it matters.\n- **Too-good offers.** \"Guaranteed returns\", giveaway doublers, urgent insider tips. Blockchain payments are irreversible, which makes them the scammer's favorite rail — skepticism is your refund policy.\n- **Recovery scams.** After any loss, \"recovery services\" appear. Recovering keyless coins is impossible ([[lost-keys-recovery]]); paying them adds a second loss.\n\nStructural choices that reduce risk: keep meaningful holdings in self-custody rather than on exchanges ([[custodial-vs-own-wallet]], [[exchange-closes-my-funds]]), keep the recovery phrase on paper in two places, and use a dedicated device or profile for significant amounts.\n\nIf you're ever unsure whether something is legitimate, the safe default is: it isn't. Verify through the official channel you already know, never through the channel that contacted you.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "lost-keys-recovery", "sending-bsv-basics", "what-are-private-keys"], "gated": false}, {"id": "lost-keys-recovery", "question": "I lost access to my wallet. Can my coins be recovered?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "recovery"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "It depends entirely on what you lost. Lost the *device* but have your recovery phrase → yes, fully recoverable in any compatible wallet. Lost the *recovery phrase and keys* themselves → no; nobody can recover self-custodied coins, not the wallet vendor, not an exchange, not the BSV Association. Lost access to an *exchange account* → contact the exchange; that's an account-recovery process like any online service.", "detail": "The three scenarios, untangled:\n\n1. **Broken/lost phone, recovery phrase safe.** Your coins were never on the phone — they're on the blockchain, and the phrase regenerates your keys ([[what-are-private-keys]]). Install a wallet on a new device, restore from the phrase, done.\n2. **Recovery phrase and keys gone.** The coins remain visible on the public ledger forever, but nothing can move them without the keys. There is no back door — the absence of an override is precisely what makes self-custody trustworthy the rest of the time ([[custodial-vs-own-wallet]]). Anyone claiming they can \"recover\" such coins for a fee is running a scam, and this recovery-scam industry specifically targets people in your situation ([[keeping-bsv-safe]]).\n3. **Exchange account lockout.** Custodial balances are the company's ledger entry, so their support can restore *account* access through identity verification — a customer-service matter, not a blockchain one.\n\nPrevention beats all of this: write the recovery phrase on paper (or metal), store it in two safe places, never photograph it or type it into anything online.", "refs": ["custodial-vs-own-wallet", "keeping-bsv-safe", "what-are-private-keys"], "gated": false}, {"id": "sending-bsv-basics", "question": "How do I send and receive BSV?", "category": "10-using-bsv", "tags": ["using", "wallets", "transactions"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Receiving: open your wallet, share the address or QR code it shows. Sending: paste or scan the recipient's address, enter the amount, confirm. The transaction reaches the recipient in seconds and costs a fraction of a cent. The one rule that matters: verify the address and the network before confirming, because blockchain payments cannot be reversed.", "detail": "Addresses are long strings precisely so that typos are detectable — but wrong-but-valid addresses (from a mispaste, or malware that swaps clipboard contents) are not. Good habits: scan QR codes rather than typing, check the first and last few characters after pasting, and send a small test amount first when the sum is significant.\n\n**Irreversibility** is a feature of the system, not a missing safety net: no company can claw a confirmed transaction back ([[how-do-transactions-work]]). That's what makes the network trustworthy for recipients — and unforgiving of sender mistakes.\n\n**Network check**: BSV addresses look similar to those of related chains ([[bitcoin-vs-bsv]]). Sending BSV to an address on a different network typically loses the coins. Wallets and exchanges label the network — read the label.\n\nSome BSV wallets also support human-readable payment handles (built on standards like Paymail) so you can pay a name instead of a string — same rules apply: verify before confirming.", "refs": ["bitcoin-vs-bsv", "how-do-transactions-work"], "gated": false}, {"id": "what-are-fees", "question": "What are transaction fees, and what do they cost on BSV?", "category": "10-using-bsv", "tags": ["using", "fees", "transactions"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A fee is the small amount you pay the network's transaction processors to include your transaction in the blockchain. On BSV, fees are typically a few satoshis ([[what-is-a-satoshi]]) — well under a cent — and they stay low by design, because the network's capacity grows with demand instead of rationing limited space.", "detail": "Fees exist because processing transactions costs real resources — machines, bandwidth, electricity. The operators who batch transactions into blocks ([[what-is-mining]]) are compensated through these fees plus newly issued coins.\n\nWhy fees differ so much between chains comes down to capacity ([[what-is-scaling]]). On a network with a small fixed block size, users compete for limited space, so fees rise when the network is busy. BSV removed the protocol-level cap, so space stays abundant and fees stay flat and tiny regardless of load — the trade-off being that processing very large blocks requires industrial-scale infrastructure, a cost carried by the network's professional operators ([[who-runs-the-bsv-network]]).\n\nThe practical consequence isn't just cheaper payments; it's a different set of possible applications. When a transaction costs 1/100th of a cent, it becomes economical to pay per article read, per game move, or per data record written ([[data-on-chain]]) — patterns that are impossible when each transaction costs dollars.\n\nFees are set by market dynamics between users and processors, not by any authority — the BSV Association doesn't set or collect them ([[what-bsva-does-not-do]]).", "refs": ["data-on-chain", "what-bsva-does-not-do", "what-is-a-satoshi", "what-is-mining", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "where-to-get-bsv", "question": "Where can I get BSV?", "category": "10-using-bsv", "tags": ["using", "exchanges"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "The common routes are: buying on a digital-asset exchange that lists BSV, receiving it directly from another person or business (it's a payment network — anyone can send to your wallet), or earning it by selling goods, services, or data in BSV-accepting applications. Which exchanges serve you depends on your country and its regulations.", "detail": "**Exchanges** are the usual entry point for buying with regular money ([[what-is-an-exchange]]). Availability is regional: an exchange must be licensed for your jurisdiction ([[why-do-licenses-matter]]), so the list of venues differs between, say, the EU, the UK, and Asia, and it changes as companies obtain — or fail to obtain — the licenses their markets require ([[orange-gateway-mica]]). Check an exchange's regulatory status for your country before depositing — and remember that coins left on an exchange are in that company's custody, not yours ([[custodial-vs-own-wallet]]).\n\n**Direct receipt** needs no intermediary at all: install a wallet ([[what-is-a-wallet]]), share your address or QR code, and anyone can pay you — across borders, in seconds, for a fraction of a cent ([[sending-bsv-basics]]).\n\n**Earning** is increasingly common in BSV applications — micro-earnings for content, gaming, or data — because tiny payments are economical on this chain ([[what-are-fees]]).\n\nIn line with this FAQ's charter, we don't recommend specific venues or discuss whether to buy at all ([[no-price-talk]]) — this answer is about *how* access works, not *whether* or *where* you should.", "refs": ["custodial-vs-own-wallet", "no-price-talk", "orange-gateway-mica", "sending-bsv-basics", "what-are-fees", "what-is-a-wallet", "what-is-an-exchange", "why-do-licenses-matter"], "gated": false}, {"id": "exchange-closes-my-funds", "question": "An exchange holding my coins is closing. What should I do?", "category": "20-exchanges-access", "tags": ["exchanges", "security", "custody"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Act on the exchange's official instructions promptly: closures normally announce a withdrawal window (Orange Gateway's 2026 notice gave 60 days, [[orange-gateway-mica]]). Withdraw coins to a wallet whose keys you control, verify the address and network carefully, and be intensely suspicious of anyone contacting *you* about the closure — closures attract scammers.", "detail": "A practical sequence:\n\n1. **Confirm the news at the source** — the exchange's own site or verified account, not screenshots or messages sent to you. Scammers exploit closure panic with fake \"expedited withdrawal\" sites ([[keeping-bsv-safe]]).\n2. **Set up self-custody first** if you don't have it: install a reputable wallet, back up the recovery phrase offline ([[what-is-a-wallet]], [[custodial-vs-own-wallet]]).\n3. **Withdraw within the window.** Verify the address and the network before confirming ([[sending-bsv-basics]]); do a small test withdrawal first. Missing the window usually means your claim moves into a slower legal wind-down process.\n4. **Export your records** — transaction history and statements — while the account is accessible; you may need them for taxes or claims.\n\nFor context on *why* closures happen: often it's licensing — an exchange that can't obtain a required authorization must stop serving that market ([[why-do-licenses-matter]], [[what-is-mica]]). An announced wind-down with a withdrawal window is an orderly process with a defined path for customers; a sudden insolvency is not — which is the practical difference between the two for anyone holding funds there.\n\nWorth restating: your coins on an exchange are that company's custody, which is exactly why this page exists. Coins already in your own wallet are untouched by any exchange's fate ([[exchange-problems-mean-bsv-problems]]).", "refs": ["custodial-vs-own-wallet", "exchange-problems-mean-bsv-problems", "keeping-bsv-safe", "orange-gateway-mica", "sending-bsv-basics", "what-is-a-wallet", "what-is-mica", "why-do-licenses-matter"], "gated": false}, {"id": "what-are-on-off-ramps", "question": "What are 'on-ramps' and 'off-ramps'?", "category": "20-exchanges-access", "tags": ["exchanges", "basics", "fiat"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "An on-ramp is any service that converts regular money (\"fiat\" — euros, dollars, pounds) into a digital asset; an off-ramp converts back. Exchanges are the classic ramps, but card-payment purchase services and payment processors play the role too. Ramps are where blockchains meet banking — which makes them the most regulated part of the ecosystem.", "detail": "The blockchain itself neither knows nor cares about banks: once you hold BSV, sending and receiving needs no ramp at all ([[sending-bsv-basics]]). Ramps matter at the boundary — turning salary into coins or coins into rent.\n\nBecause that boundary touches bank accounts and customer funds, ramp providers carry the heaviest compliance load: identity checks, anti-money-laundering rules, and licenses per jurisdiction ([[who-regulates-crypto]], [[why-do-licenses-matter]]). That's why ramp availability is the part of the ecosystem that shifts most when regulation changes — the MiCA transition that ended in July 2026 being the current example ([[what-is-mica]], [[orange-gateway-mica]]).\n\nWhen a particular ramp disappears, the practical questions are covered in [[exchange-closes-my-funds]] and [[where-to-get-bsv]]: coins in self-custody are unaffected, and access continues through whichever licensed venues serve your region.", "refs": ["exchange-closes-my-funds", "orange-gateway-mica", "sending-bsv-basics", "what-is-mica", "where-to-get-bsv", "who-regulates-crypto", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-a-listing", "question": "What does it mean when a coin is 'listed' on an exchange?", "category": "20-exchanges-access", "tags": ["exchanges", "listings"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "A listing means an exchange has decided to offer trading in that coin — it added BSV/dollar or BSV/euro pairs to its marketplace. It's a commercial decision by the exchange, reflecting its assessment of customer demand, technical integration effort, and regulatory comfort. More listings mean easier access for users in more places; they say nothing about the technology itself.", "detail": "Getting listed involves the exchange integrating the coin's technology (wallets, deposits, withdrawals — for BSV this includes handling its high-throughput design), satisfying its own compliance review, and often ongoing commercial arrangements around liquidity — ensuring there are enough standing buy/sell orders for smooth trading, sometimes with specialist firms called market-makers.\n\nWho does what, in the BSV ecosystem's case: exchanges decide listings; ecosystem organizations can *facilitate* — providing technical documentation, integration support, and commercial coordination. In BSV's case that facilitation is handled by EB Labs, a commercial venture working alongside the BSV Association ([[what-is-eb-labs]]) — while the decision always remains the exchange's own.\n\nDelistings are the same decision in reverse ([[why-do-exchanges-delist]]): commercial or regulatory, made by the venue. Because listings come and go, where BSV trades varies by time and by country ([[where-to-get-bsv]]).", "refs": ["what-is-eb-labs", "where-to-get-bsv", "why-do-exchanges-delist"], "gated": false}, {"id": "what-is-an-exchange", "question": "What is a digital-asset exchange?", "category": "20-exchanges-access", "tags": ["exchanges", "basics"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "An exchange is a private company that runs a marketplace where people trade digital assets against regular money or each other. It's the usual bridge between the banking world and blockchains — and it is a business with its own owners, rules, licenses, and risks, entirely separate from the blockchains whose coins it trades.", "detail": "Functionally, an exchange does three things: holds customer deposits (money and coins — making it a custodian, [[custodial-vs-own-wallet]]), matches buyers with sellers, and connects to banking rails so you can move regular money in and out ([[what-are-on-off-ramps]]).\n\nThe separateness is the point beginners most often miss. An exchange listing BSV is a commercial decision by that company ([[what-is-a-listing]]); an exchange closing is a company event ([[exchange-closes-my-funds]], [[orange-gateway-mica]]). None of it changes the blockchain itself, which runs independently of any venue trading its coin ([[exchange-problems-mean-bsv-problems]]).\n\nBecause exchanges touch customer money, they're regulated financial businesses in most jurisdictions ([[who-regulates-crypto]]). Licenses determine where they may operate and which customers they may serve — which is why BSV's availability differs by country and changes over time ([[where-to-get-bsv]], [[why-do-licenses-matter]]).", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-listing", "where-to-get-bsv", "who-regulates-crypto", "why-do-licenses-matter"], "gated": false}, {"id": "why-do-exchanges-delist", "question": "Why do exchanges delist coins?", "category": "20-exchanges-access", "tags": ["exchanges", "listings", "regulation"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "For their own commercial or regulatory reasons: low trading volume that doesn't cover integration costs, changed compliance assessments, licensing constraints in some market, or business strategy shifts. A delisting is the exchange's decision about its own product shelf — it doesn't switch off the coin's network, and holders can withdraw to their own wallets.", "detail": "Common drivers across the industry:\n\n- **Economics** — each listed coin costs engineering and compliance upkeep; thin trading may not justify it.\n- **Regulation** — an exchange's license may constrain what it can offer in a jurisdiction ([[why-do-licenses-matter]]); when rules like MiCA arrive ([[what-is-mica]]), venues re-evaluate their catalogs or, if unlicensed, must exit entirely ([[orange-gateway-mica]]).\n- **Risk posture** — exchanges periodically re-run internal reviews and prune assets they've become less comfortable supporting, by their own criteria.\n- **Commercial disputes or strategy** — relationships and priorities change.\n\nWhat a delisting means for a holder is mechanical: trading on that venue stops, and the exchange announces a window to withdraw the coins to your own wallet ([[exchange-closes-my-funds]]). The network itself, and coins in self-custody, are unaffected ([[exchange-problems-mean-bsv-problems]]).\n\nBSV itself has been both delisted and newly listed by venues over its history. In each case the venue published or communicated its own reasons — those statements, from the venues themselves, are the primary sources on why ([[ecosystem-who-is-who]]). What is structural rather than case-specific: listing decisions belong to venues, not to ecosystem organizations ([[what-bsva-does-not-do]], [[what-is-eb-labs]]).", "refs": ["ecosystem-who-is-who", "exchange-closes-my-funds", "exchange-problems-mean-bsv-problems", "orange-gateway-mica", "what-bsva-does-not-do", "what-is-eb-labs", "what-is-mica", "why-do-licenses-matter"], "gated": false}, {"id": "does-regulation-affect-my-coins", "question": "Does regulation affect the coins I already hold?", "category": "30-regulation", "tags": ["regulation", "custody", "wallets"], "updated": "2026-07-03", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114"], "short": "Regulation governs companies and their services, not the blockchain or your self-custodied coins. What it changes for you is the *service landscape*: which exchanges can serve your country, what identity checks apply when you trade, which ramps exist between coins and bank money. Coins in your own wallet remain yours and remain movable on the network regardless.", "detail": "Untangling the layers helps:\n\n- **The network layer** — the blockchain itself, transaction processing, your wallet software — operates worldwide and isn't the object of licensing ([[who-runs-the-bsv-network]], [[what-is-a-casp]]). A rule like the EU's MiCA ([[what-is-mica]]) doesn't reach into the protocol.\n- **The service layer** — exchanges, custodians, ramps — is where regulation bites ([[why-do-licenses-matter]]). When rules tighten, this layer visibly reshuffles: some venues get licensed, some exit ([[orange-gateway-mica]]), users migrate.\n\nTwo practical consequences follow. First, coins held on an exchange are exposed to that company's regulatory fate — a licensing failure there triggers a withdrawal process ([[exchange-closes-my-funds]]) — while coins in self-custody are not ([[custodial-vs-own-wallet]]). Second, even a self-custody holder feels regulation indirectly at the edges: converting to bank money goes through licensed ramps, and tax obligations on holdings or gains exist independently of custody (rules vary by country; this FAQ doesn't give tax advice).\n\nOne boundary to state plainly: none of this means self-custody is a way around the law — it means the law regulates intermediaries, and when you hold your own keys there is no intermediary to regulate.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "orange-gateway-mica", "what-is-a-casp", "what-is-mica", "who-runs-the-bsv-network", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-a-casp", "question": "What is a CASP?", "category": "30-regulation", "tags": ["regulation", "mica", "eu"], "updated": "2026-07-03", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114"], "short": "CASP stands for \"crypto-asset service provider\" — the EU's legal term, under MiCA, for a company that provides crypto services to customers: running an exchange, holding coins in custody, executing orders, advising, or transferring assets on clients' behalf. If a business does these things for customers in the EU or the wider EEA (the EU plus Iceland, Liechtenstein, and Norway), it needs a CASP authorization.", "detail": "The label is about *activities*, not about technology. A company becomes a CASP by what it does commercially — taking custody of customers' coins ([[custodial-vs-own-wallet]]), operating a trading venue ([[what-is-an-exchange]]), exchanging crypto for regular money ([[what-are-on-off-ramps]]) — regardless of which blockchains it supports.\n\nWhat authorization involves, in broad strokes: a national regulator reviews the company's capital, governance, custody arrangements, and complaint handling — BaFin in Germany, the AMF in France, and for Iceland (an EEA country applying the EU's rules) the Central Bank of Iceland. Once granted, the license is valid across the whole EU/EEA. The regulator can also refuse or revoke it — the situation Orange Gateway reported in 2026 ([[orange-gateway-mica]]).\n\nWhat's *not* a CASP matters too: writing wallet software without holding user keys, running blockchain infrastructure ([[who-runs-the-bsv-network]]), or publishing about crypto are generally not licensable CASP activities. This is why the same event can close an exchange while leaving the network and self-custody users untouched ([[does-regulation-affect-my-coins]]).", "refs": ["custodial-vs-own-wallet", "does-regulation-affect-my-coins", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-an-exchange", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-mica", "question": "What is MiCA?", "category": "30-regulation", "tags": ["regulation", "mica", "eu"], "updated": "2026-07-03", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.lexology.com/library/detail.aspx?g=2d2bd8e1-5dfb-4674-bdd6-f53c4e7a5d1c", "https://www.coindesk.com/business/2026/06/29/mica-july-1-deadline-could-leave-10-million-crypto-users-searching-for-a-new-platform-in-the-eu"], "short": "MiCA (\"Markets in Crypto-Assets\") is the European Union's regulation for crypto businesses. Since taking full effect, it requires companies that hold, trade, or manage customers' digital assets to be licensed — bringing them under rules similar in spirit to other financial services. After the transition period ended on 1 July 2026, unlicensed providers had to stop serving EU/EEA customers.", "detail": "MiCA regulates *service providers* — exchanges, custodians, brokers, called CASPs ([[what-is-a-casp]]) — not the blockchains themselves ([[does-regulation-affect-my-coins]]). Its stated aims are the usual ones of financial regulation: protecting customer funds, market integrity, and clear accountability, applied uniformly across all EU and EEA countries (which is why an Icelandic exchange answers to it through Iceland's central bank, [[orange-gateway-mica]]).\n\nThe mechanics that matter to an ordinary user: a company needs authorization from a national regulator in one member state, and that license then \"passports\" across the whole bloc. Existing businesses were given a transition period to obtain licenses; that period's final deadline was 1 July 2026, and industry reporting around the deadline indicated most European crypto firms had not yet obtained one — making mid-2026 a period of visible consolidation, with some platforms winding down and users migrating to licensed venues.\n\nFor BSV specifically, MiCA is neither pro- nor anti- any particular blockchain: it decides *which companies* may offer services in Europe, and therefore shapes where Europeans can buy, sell, or custody BSV ([[where-to-get-bsv]], [[what-are-on-off-ramps]]).", "refs": ["does-regulation-affect-my-coins", "orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-casp", "where-to-get-bsv"], "gated": false}, {"id": "who-regulates-crypto", "question": "Who regulates crypto?", "category": "30-regulation", "tags": ["regulation", "licensing"], "updated": "2026-07-03", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.finma.ch/en/"], "short": "It depends where the *company* serving you operates — there is no global crypto regulator. In the EU/EEA it's national financial authorities applying the shared MiCA rulebook; in Switzerland it's FINMA; in the UK the FCA; in the US several agencies share the ground. The blockchain networks themselves aren't licensed by anyone — regulation attaches to businesses and their activities.", "detail": "The pattern across jurisdictions is consistent even where the details differ: activities that involve holding or moving *other people's assets* — exchanges, custodians, brokers, payment ramps ([[what-are-on-off-ramps]]) — require authorization from the local financial supervisor, plus anti-money-laundering compliance nearly everywhere.\n\nA quick orientation map (as of mid-2026):\n\n- **EU/EEA**: one rulebook, MiCA ([[what-is-mica]]), enforced by each country's authority — BaFin (Germany), AMF (France), Central Bank of Iceland, and so on — with licenses valid across the whole bloc ([[what-is-a-casp]]).\n- **Switzerland**: FINMA supervises financial activities; crypto services fall under existing financial-market laws rather than a dedicated crypto act.\n- **UK, Singapore, Japan, UAE and others**: dedicated regimes of varying scope run by their financial authorities.\n- **US**: multiple federal and state bodies (SEC, CFTC, FinCEN, state regulators) with boundaries that continue to evolve.\n\nBecause a license is per-jurisdiction, the same service can be available in one country and not its neighbor — the main reason \"where can I get BSV\" has no single global answer ([[where-to-get-bsv]]) and why regulatory deadlines reshape the venue map ([[orange-gateway-mica]]).", "refs": ["orange-gateway-mica", "what-are-on-off-ramps", "what-is-a-casp", "what-is-mica", "where-to-get-bsv"], "gated": false}, {"id": "why-do-licenses-matter", "question": "Why do licenses matter for crypto companies?", "category": "30-regulation", "tags": ["regulation", "licensing", "exchanges"], "updated": "2026-07-03", "sources": ["https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114", "https://www.lexology.com/library/detail.aspx?g=2d2bd8e1-5dfb-4674-bdd6-f53c4e7a5d1c"], "short": "Because companies that hold other people's money are exactly where things historically go wrong. A license means a regulator has examined the company's finances, governance, and custody arrangements and holds it accountable on an ongoing basis. For users, \"licensed for my country\" is the closest thing to a baseline safety check when choosing where to trade or custody assets.", "detail": "What a license actually buys a customer, in concrete terms: capital requirements (the company must hold reserves), segregation rules (customer assets kept apart from company money), audit and reporting duties, complaint procedures, and a regulator with the power to intervene. None of it makes a company failure impossible — it makes failures rarer and more orderly, with wind-down processes instead of vanishing acts ([[exchange-closes-my-funds]]).\n\nThe flip side: a company that can't obtain a license must stop offering the regulated services in that market — however good or bad its product otherwise is. That's the mechanism behind mid-2026's wave of European platform closures after the MiCA deadline ([[what-is-mica]], [[orange-gateway-mica]]): a legal cutoff, applied industry-wide, regardless of which coins a venue traded.\n\nTwo boundaries keep expectations honest. Licenses attach to *companies*, so a licensing failure is a company event, not a blockchain event ([[does-regulation-affect-my-coins]]). And regulation covers *custodial services* — coins in your own wallet involve no license because no company holds anything on your behalf ([[custodial-vs-own-wallet]]).", "refs": ["custodial-vs-own-wallet", "does-regulation-affect-my-coins", "exchange-closes-my-funds", "orange-gateway-mica", "what-is-mica"], "gated": false}, {"id": "ecosystem-who-is-who", "question": "Who's who in the BSV ecosystem?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "overview"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Four distinct groups, often conflated: the **BSV Association** (Swiss non-profit steward of the protocol), **EB Labs** (the commercial venture alongside it, handling exchange relationships and ecosystem products), **independent network operators** (the businesses processing transactions), and **independent companies** — exchanges, wallet makers, app builders, and media, each owned and run separately. Knowing which group did something answers most \"why did X happen?\" questions.", "detail": "The map, with what each group decides:\n\n| Who | What they are | What they decide |\n|---|---|---|\n| BSV Association | Swiss non-profit ([[what-is-the-bsv-association]]) | Protocol software releases, standards, education programs — not the network's operation ([[what-bsva-does-not-do]]) |\n| EB Labs | Commercial venture alongside BSVA ([[what-is-eb-labs]]) | Its own commercial agreements facilitating listings — not exchanges' decisions |\n| Network operators | Independent processing businesses ([[who-runs-the-bsv-network]]) | Whether to process, what infrastructure to run |\n| Independent companies | Exchanges, wallets, apps, media | Their own products, listings ([[what-is-a-listing]]), compliance ([[why-do-licenses-matter]]), editorial lines |\n\nThe last row deserves emphasis: exchanges that trade BSV, wallets that store it, media outlets that cover it — including enthusiastic ones — are independent firms. Their statements are their own, their business outcomes are their own ([[orange-gateway-mica]]), and none of them speaks for the technology or the Association ([[exchange-problems-mean-bsv-problems]]).\n\nA useful habit when news breaks: first ask \"which box is this actor in?\" A company event (closure, dispute, marketing claim) reads very differently from a protocol event — and protocol events are the only kind the whole ecosystem shares ([[is-bsv-a-company]]).", "refs": ["exchange-problems-mean-bsv-problems", "is-bsv-a-company", "orange-gateway-mica", "what-bsva-does-not-do", "what-is-a-listing", "what-is-eb-labs", "what-is-the-bsv-association", "who-runs-the-bsv-network", "why-do-licenses-matter"], "gated": false}, {"id": "how-is-bsv-developed", "question": "Who develops the BSV software, and can they change the rules?", "category": "40-ecosystem", "tags": ["ecosystem", "development", "governance"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "The BSV Association maintains the main node software — the program that network operators run to process transactions — and documents the protocol, with the stated policy of keeping the base protocol stable (\"set in stone\") rather than evolving it. Publishing software isn't the same as commanding the network: the independent operators who run nodes choose whether to adopt any release ([[who-runs-the-bsv-network]]).", "detail": "Development happens in layers. The **base protocol** — the transaction rules everything depends on — is treated as fixed by design; BSV's philosophy is that a stable foundation is what businesses can build on for decades, the way the internet's core protocols stayed stable while everything above them flourished. The **node software** implementing that protocol is engineered and maintained by the Association's teams (including the high-throughput Teranode implementation), released openly ([[what-is-the-bsv-association]]). **Applications and standards** above that — wallets, payment protocols, data services — come from the whole ecosystem ([[ecosystem-who-is-who]]).\n\nOn \"can they change the rules\": a software maintainer proposes; the network disposes. Operators adopt releases that serve their interests, and a change the operators rejected simply wouldn't run ([[bsva-controls-bsv]]). This adoption dynamic — not any legal authority — is the actual governance of a public blockchain, and it's also how the chain's history got its forks ([[how-did-bsv-start]]).\n\nFor developers: the software and protocol documentation are public, and building applications requires no one's permission ([[data-on-chain]]).", "refs": ["bsva-controls-bsv", "data-on-chain", "ecosystem-who-is-who", "how-did-bsv-start", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-bsva-does-not-do", "question": "What does the BSV Association NOT do?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "misconceptions"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "The Association does not run exchanges or decide their listings, does not hold or recover anyone's coins, does not control the network or reverse transactions, does not set fees or prices, and does not license companies (regulators do that). Most ecosystem frustrations land on the Association's doorstep anyway — this page exists to say, factually, which doors it actually has keys to.", "detail": "The concrete list, because vagueness is how confusion spreads:\n\n- **Exchanges**: it doesn't own or operate any venue, doesn't decide who lists or delists BSV ([[what-is-a-listing]], [[why-do-exchanges-delist]]), and doesn't control any exchange's licensing outcome — those rest with the venue and its regulator ([[orange-gateway-mica]], [[why-do-licenses-matter]]). EB Labs, the commercial venture alongside the Association, *facilitates* exchange relationships ([[what-is-eb-labs]]); facilitation is not decision power.\n- **Your coins**: it has no access to anyone's wallets or exchange accounts, cannot freeze or recover funds ([[lost-keys-recovery]]), and never asks for keys — anyone doing so in its name is a scammer ([[keeping-bsv-safe]]).\n- **The network**: transaction processing is done by independent operators ([[who-runs-the-bsv-network]]); the Association maintains software those operators may choose to run, which is influence, not control ([[bsva-controls-bsv]]). It cannot reverse a transaction or censor an address.\n- **Markets**: it doesn't set transaction fees ([[what-are-fees]]), doesn't make markets, and doesn't comment on price — nor does this FAQ ([[no-price-talk]]).\n- **Licensing**: it is not a regulator; it neither grants nor withholds any company's authorization ([[who-regulates-crypto]]).\n\nWhat remains is its actual job — protocol stewardship, software, standards, education, promotion ([[what-is-the-bsv-association]]) — which is substantial, but categorically different from the powers often attributed to it.", "refs": ["bsva-controls-bsv", "keeping-bsv-safe", "lost-keys-recovery", "no-price-talk", "orange-gateway-mica", "what-are-fees", "what-is-a-listing", "what-is-eb-labs", "what-is-the-bsv-association", "who-regulates-crypto", "who-runs-the-bsv-network", "why-do-exchanges-delist", "why-do-licenses-matter"], "gated": false}, {"id": "what-is-eb-labs", "question": "What is EB Labs?", "category": "40-ecosystem", "tags": ["ecosystem", "eb-labs", "exchanges"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "EB Labs is a commercial venture that works alongside the BSV Association, focused on the business side of the ecosystem: maintaining relationships with digital-asset exchanges and market-makers, facilitating BSV listings, and selling products, consulting, and development services that complement the technology. It handles the commercial work the non-profit Association deliberately keeps separate from its stewardship role.", "detail": "The division of labor is the point. The Association is a non-profit steward — protocol, software, education ([[what-is-the-bsv-association]]). Exchange listings, however, are commercial arrangements between businesses ([[what-is-a-listing]]): they involve negotiations, service contracts, and market-development work. EB Labs exists so that this commercial activity is done by a dedicated business with its own accountability, keeping the two roles cleanly apart.\n\nWhat EB Labs does: builds and maintains relationships with exchanges and market-making firms, facilitates the process of getting and keeping BSV listed on trading venues, and offers products, consulting, development, and support services related to digital business models and blockchain applications.\n\nWhat it doesn't do: it doesn't make exchanges' decisions for them — whether a venue lists, keeps, or drops an asset, or obtains its own licenses ([[orange-gateway-mica]]), remains that venue's own business ([[what-bsva-does-not-do]]).", "refs": ["orange-gateway-mica", "what-bsva-does-not-do", "what-is-a-listing", "what-is-the-bsv-association"], "gated": true}, {"id": "what-is-the-bsv-association", "question": "What is the BSV Association?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "governance"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "The BSV Association (BSVA) is a Switzerland-based non-profit that stewards the BSV Blockchain: it maintains the node software (the program that the network's transaction processors run) and the protocol standards, supports developers and education, and promotes adoption of the technology. It is a steward, not an owner — it doesn't control the network, doesn't operate exchanges, and doesn't manage anyone's coins.", "detail": "Public blockchains need someone to do the unglamorous shared work: maintaining reference software, documenting standards, coordinating security response, educating developers. For BSV, the Association carries that mandate, funded as a non-profit and based in Zug, Switzerland.\n\nWhat it does, concretely: maintains and publishes the node software that transaction processors run ([[how-is-bsv-developed]]); stewards protocol standards; runs developer education (including the BSV Academy); supports ecosystem projects; and represents the technology toward institutions and policymakers.\n\nWhat it deliberately is *not*: an operator of the network (independent processors run it — [[who-runs-the-bsv-network]]), a financial company (it holds no customer assets and runs no venue — [[what-bsva-does-not-do]]), or a controller of the chain ([[bsva-controls-bsv]]). Commercial exchange-facing work is handled separately by EB Labs, a commercial venture working alongside the Association, precisely to keep business arrangements apart from the non-profit stewardship role ([[what-is-eb-labs]]).\n\nWhy the structure matters to an ordinary user: when ecosystem events happen — a venue closes ([[orange-gateway-mica]]), an app shuts down — knowing what the Association actually does (and doesn't) tells you what it could and couldn't have decided ([[ecosystem-who-is-who]]).", "refs": ["bsva-controls-bsv", "ecosystem-who-is-who", "how-is-bsv-developed", "orange-gateway-mica", "what-bsva-does-not-do", "what-is-eb-labs", "who-runs-the-bsv-network"], "gated": false}, {"id": "who-runs-the-bsv-network", "question": "Who actually runs the BSV network?", "category": "40-ecosystem", "tags": ["ecosystem", "mining", "nodes"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Independent transaction processors — often called miners or node operators, a \"node\" being a computer running the network's software — run the network. They are separate businesses, in various countries, that operate the machines validating transactions and building blocks, earning fees and newly issued coins for it. No permission is needed to join, and no single party (including the BSV Association) runs the network itself.", "detail": "The processors' role: collect broadcast transactions, check them against the protocol rules, assemble them into blocks ([[what-is-mining]]), and publish those blocks to the shared chain ([[what-is-a-blockchain]]). Competition among them — anyone can enter, the work is paid ([[what-are-fees]]) — is what keeps the record honest: cheating one's own ledger copy is pointless when everyone else's copies disagree.\n\nThe ecosystem around them divides cleanly ([[ecosystem-who-is-who]]): processors run the network; the BSV Association maintains the software and standards most processors choose to run ([[what-is-the-bsv-association]], [[how-is-bsv-developed]]); businesses like exchanges and wallet apps build services on top ([[what-is-an-exchange]]). Each layer makes its own decisions — which is why \"who decided X?\" always has a specific answer, and it's rarely \"the network\" ([[what-bsva-does-not-do]]).\n\nAnyone can verify the network's operation directly — blocks, transactions, and activity are public and inspectable in real time on chain explorers such as WhatsOnChain ([[is-bsv-dead]]).", "refs": ["ecosystem-who-is-who", "how-is-bsv-developed", "is-bsv-dead", "what-are-fees", "what-bsva-does-not-do", "what-is-a-blockchain", "what-is-an-exchange", "what-is-mining", "what-is-the-bsv-association"], "gated": false}, {"id": "data-on-chain", "question": "Can a blockchain store more than payments?", "category": "50-technology", "tags": ["technology", "data", "applications"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Yes — transactions can carry arbitrary data, so the chain can serve as a public, timestamped, tamper-evident record for anything: documents, sensor readings, game events, supply-chain checkpoints. This is practical on BSV specifically because fees are a fraction of a cent ([[what-are-fees]]); on chains where a transaction costs dollars, per-record data writing is uneconomical.", "detail": "What \"data on chain\" buys that a database doesn't: **provable time and integrity**. A record written into a block is timestamped by the network, can't be quietly altered afterward ([[what-is-a-blockchain]]), and can be verified by anyone without trusting the writer ([[what-is-spv]]). A company's own database proves nothing to outsiders; a chain record does.\n\nTypical patterns in the BSV ecosystem: notarization (proving a document existed unchanged at a date), audit trails (regulatory logs, supply-chain events), machine data (IoT sensors writing readings paired with micropayments), content and gaming (actions, ownership records, micro-earnings), and hybrid designs where bulk data lives off-chain with only fingerprints (hashes) anchored on-chain for integrity.\n\nBoundaries, honestly stated: on-chain data is public and permanent — sensitive material belongs off-chain with only its hash anchored ([[is-blockchain-anonymous]]). Writing data costs per byte, so economics still shape design. And \"on the blockchain\" doesn't make a claim *true* — it proves *when* something was recorded and that it hasn't changed, not that its contents were accurate.\n\nBuilding such applications requires no permission from anyone ([[how-is-bsv-developed]]).", "refs": ["how-is-bsv-developed", "is-blockchain-anonymous", "what-are-fees", "what-is-a-blockchain", "what-is-spv"], "gated": false}, {"id": "how-do-transactions-work", "question": "What happens when I send a transaction?", "category": "50-technology", "tags": ["technology", "transactions"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "Your wallet builds a small signed message — \"move these coins to that address\" — proves it with your key, and broadcasts it to the network. Independent processors check the signature and the coins' availability, accept it within seconds, and soon include it in a block, making it a permanent part of the public record — with no intermediary institution in the path.", "detail": "Step by step, minus the math:\n\n1. **Compose**: the wallet selects coins you control (blockchain coins exist as discrete spendable pieces, like digital banknotes of arbitrary denomination) and drafts outputs — the recipient's amount and any change back to you.\n2. **Sign**: your private key ([[what-are-private-keys]]) produces a signature that proves authorization without revealing the key itself.\n3. **Broadcast**: the wallet sends the transaction to network processors ([[who-runs-the-bsv-network]]), who verify it — valid signature, coins unspent, rules followed — and start treating those coins as spent. On BSV this takes seconds, which is why a payee typically accepts payment at this point.\n4. **Confirm**: a processor includes the transaction in a block ([[what-is-mining]]); each subsequent block buries it deeper, making reversal computationally impractical. This is what \"confirmations\" count.\n\nTwo properties fall out of the design. **Irreversibility**: no operator can undo a confirmed transaction — protection for recipients, unforgiving of sender error ([[sending-bsv-basics]]). **Publicity**: the transaction is visible to anyone on the shared ledger ([[is-blockchain-anonymous]]) — you can watch your own payment confirm in real time on a chain explorer.", "refs": ["is-blockchain-anonymous", "sending-bsv-basics", "what-are-private-keys", "what-is-mining", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-mining", "question": "What is mining?", "category": "50-technology", "tags": ["technology", "mining", "proof-of-work"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Mining is the competitive work of bundling transactions into blocks and attaching them to the chain. Processors race to solve a costly computational puzzle; the winner publishes the next block and collects the reward — transaction fees plus newly issued coins. The cost is the security: rewriting history would mean redoing that work against the whole network's ongoing effort.", "detail": "The puzzle (\"proof of work\") has no meaning in itself — its point is to be expensive to solve and instant to verify. That asymmetry turns electricity and hardware into a security budget: an attacker wanting to alter a past block would need to redo its work *and* outpace everyone else building forward ([[what-is-a-blockchain]]), which gets more hopeless with every added block. That's why more confirmations mean more settled ([[how-do-transactions-work]]).\n\nEconomically, mining is a business, not a hobby: industrial operators ([[who-runs-the-bsv-network]]) invest in hardware and power, and are paid in fees plus a per-block issuance of new coins that halves on a fixed schedule — meaning fee revenue must carry the system long-term. BSV's design bets on that explicitly: huge transaction volumes at tiny per-transaction fees ([[what-is-scaling]], [[what-are-fees]]) rather than few transactions at high fees.\n\n\"Mining\" is a mildly misleading name — nothing is dug up. It's transaction processing with a built-in security deposit, and the coins are issuance on a schedule, not treasure found.", "refs": ["how-do-transactions-work", "what-are-fees", "what-is-a-blockchain", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-scaling", "question": "What does 'scaling' mean, and what is BSV's approach?", "category": "50-technology", "tags": ["technology", "scaling", "blocks"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Scaling is a blockchain's ability to handle growing transaction volume. BSV's approach is \"big blocks\": no protocol-fixed limit on block size, so capacity grows with demand and hardware, keeping fees tiny at any volume. Other chains cap block size and route volume elsewhere — the design disagreement that produced BSV in the first place.", "detail": "The constraint is simple arithmetic: blocks arrive at a roughly fixed rhythm, so block size sets transactions-per-second. Keep blocks small and the chain stays light to run but space becomes scarce — users bid up fees when it's busy. Let blocks grow and capacity is abundant — fees stay near zero ([[what-are-fees]]) — but processing big blocks demands serious infrastructure, pushing network operation toward professional data-center operators ([[who-runs-the-bsv-network]]).\n\nThat trade-off split the original Bitcoin community ([[how-did-bsv-start]]): BTC chose small blocks with additional layers on top; BSV chose unbounded on-chain scale, accepting professionalized infrastructure as the cost ([[bitcoin-vs-bsv]]). BSV's current engineering effort, the Teranode node implementation, targets throughput in the range of a million transactions per second — capacity intended for payment-network and data workloads ([[data-on-chain]]).\n\nWhy a beginner should care at all: capacity determines what the chain is *for*. Dollar-fee chains suit large, infrequent settlements. Sub-cent-fee chains make micropayments and per-event data recording economical — different tools shaped by that one design choice.", "refs": ["bitcoin-vs-bsv", "data-on-chain", "how-did-bsv-start", "what-are-fees", "who-runs-the-bsv-network"], "gated": false}, {"id": "what-is-spv", "question": "What is SPV, and why does it matter?", "category": "50-technology", "tags": ["technology", "spv", "verification"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/", "https://protocol.bsvblockchain.org/"], "short": "SPV (\"Simplified Payment Verification\") is the method that lets a wallet verify a payment is real without downloading the entire blockchain. It checks a compact mathematical proof that the transaction sits in a valid block. It's what makes lightweight phone wallets trustworthy on a chain whose full history is far too big for a phone — essential on a large-block chain like BSV.", "detail": "The problem SPV solves: a chain built for global volume ([[what-is-scaling]]) grows enormous, and requiring every participant to store all of it would limit participation to data centers. SPV, described in the original Bitcoin white paper, splits the roles: heavyweight processors maintain the full record ([[who-runs-the-bsv-network]]); everyone else verifies just what concerns them.\n\nHow it works, roughly: every block includes a compact fingerprint (a \"merkle root\") summarizing all its transactions. A wallet holding only the chain of block headers — tiny, kilobytes per day — can take a transaction plus a short proof (a \"merkle path\") and confirm the transaction is genuinely included in a real block ([[what-is-a-blockchain]]). Faking such a proof would require redoing the network's proof-of-work ([[what-is-mining]]), the same cost that protects everything else.\n\nThe practical payoff: payments verifiable peer-to-peer in milliseconds, wallets that run on any device, and businesses that can accept blockchain payments without operating blockchain infrastructure. In BSV's design philosophy, SPV isn't a compromise — it's how the original architecture intended everyday users to participate ([[how-do-transactions-work]]).", "refs": ["how-do-transactions-work", "what-is-a-blockchain", "what-is-mining", "what-is-scaling", "who-runs-the-bsv-network"], "gated": false}, {"id": "bsva-controls-bsv", "question": "Doesn't the BSV Association control BSV?", "category": "60-misconceptions", "tags": ["misconceptions", "bsva", "governance"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "No — it stewards, which is different in a specific, checkable way. The Association writes and maintains the node software and standards, but the network is run by independent operators who choose whether to adopt any release. Maintaining the software that others voluntarily run is influence through usefulness, not control through authority.", "detail": "The confusion is understandable: the Association is the most visible organization in the ecosystem, it maintains the reference software ([[how-is-bsv-developed]]), and it speaks publicly for the technology. Visibility reads as control. But test it against what control would mean:\n\n- Can it reverse a transaction, freeze coins, or censor an address? No — nobody can; that's the design ([[how-do-transactions-work]], [[what-bsva-does-not-do]]).\n- Can it force operators to run a software change? No — operators are independent businesses that adopt what serves them ([[who-runs-the-bsv-network]]); a rejected release simply doesn't run. Blockchain history's forks, including BSV's own origin ([[how-did-bsv-start]]), are what operator disagreement looks like in practice.\n- Can it set fees or decide listings? No — fees emerge from the market ([[what-are-fees]]); listings are exchanges' decisions ([[what-is-a-listing]]).\n\nWhat it *can* do is real but bounded: shape the software roadmap, steward standards, fund education, promote adoption ([[what-is-the-bsv-association]]). BSV's \"set in stone\" protocol policy narrows even the roadmap lever — the stated commitment is to keep the base rules stable rather than steer them.\n\nWhy the distinction matters beyond pedantry: attributing control to the Association leads to blaming it for things it cannot decide ([[orange-gateway-mica]], [[exchange-problems-mean-bsv-problems]]) — and to missing who actually made a given decision ([[ecosystem-who-is-who]]).", "refs": ["ecosystem-who-is-who", "exchange-problems-mean-bsv-problems", "how-did-bsv-start", "how-do-transactions-work", "how-is-bsv-developed", "orange-gateway-mica", "what-are-fees", "what-bsva-does-not-do", "what-is-a-listing", "what-is-the-bsv-association", "who-runs-the-bsv-network"], "gated": false}, {"id": "exchange-problems-mean-bsv-problems", "question": "An exchange trading BSV failed. Doesn't that mean BSV failed?", "category": "60-misconceptions", "tags": ["misconceptions", "exchanges", "network"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "No — it means a company failed. An exchange is an independent business that trades many assets ([[what-is-an-exchange]]); its solvency, licensing, and management are its own. The blockchain ran before that venue listed it and runs after it closes. The real, bounded impact is on *access* (one fewer place to trade in some region) and on *customers who held funds there* — which is a custody lesson, not a technology verdict.", "detail": "The category error is mixing layers ([[ecosystem-who-is-who]]): venues live in the services layer; the network lives below it ([[is-bsv-a-company]]). Exchange failures happen across the industry for service-layer reasons — insolvency, mismanagement, licensing ([[why-do-licenses-matter]]) — and the mid-2026 MiCA deadline produced a wave of them across Europe affecting platforms trading *all* assets ([[what-is-mica]]), BSV venues among them ([[orange-gateway-mica]]).\n\nA sanity check that generalizes: when a bank fails, nobody concludes the euro stopped working; when a bookstore closes, books didn't fail. The venue/asset distinction is the same here, with one sharpener — on a blockchain you can *verify* the asset layer kept running, in real time, yourself ([[is-bsv-dead]]).\n\nWhat such an event *does* legitimately signal: access in a region got narrower until other venues fill in ([[where-to-get-bsv]]), affected customers must run the withdrawal playbook ([[exchange-closes-my-funds]]), and everyone gets re-taught the custody lesson ([[custodial-vs-own-wallet]]). Real consequences — none of them a property of the protocol.", "refs": ["custodial-vs-own-wallet", "ecosystem-who-is-who", "exchange-closes-my-funds", "is-bsv-a-company", "is-bsv-dead", "orange-gateway-mica", "what-is-an-exchange", "what-is-mica", "where-to-get-bsv", "why-do-licenses-matter"], "gated": false}, {"id": "is-blockchain-anonymous", "question": "Are blockchain payments anonymous?", "category": "60-misconceptions", "tags": ["misconceptions", "privacy", "transactions"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "No — closer to the opposite. Every BSV transaction is public and permanent: amounts, addresses, and timing are visible to anyone, forever ([[how-do-transactions-work]]). What the chain omits is your *name* next to the address — until something links them. The accurate word is \"pseudonymous,\" and the pseudonym is thinner than most people assume.", "detail": "Where the linkage comes from in practice: licensed exchanges verify identity ([[why-do-licenses-matter]]), so coins moving between your verified account and your addresses connect the dots for anyone with lawful access to exchange records; merchants link addresses to deliveries and invoices; and chain analysis — following the public graph of transactions — is a mature industry serving investigators. Any address you reuse accumulates a visible history that's one identification away from being *your* visible history.\n\nThe practical framing for privacy: treat on-chain activity like activity in public. Lawful privacy practices exist — fresh addresses per payment, keeping sensitive data off-chain with only fingerprints anchored ([[data-on-chain]]) — but the ledger is not a hiding place, and investigators do use its traceability.\n\nBSV's stated design position is to keep this transparency rather than obscure it, treating auditability and compatibility with regulation as goals of the system ([[what-is-bsv]]). Other blockchain projects make different design choices about privacy; describing that spectrum is beyond this FAQ's scope.", "refs": ["data-on-chain", "how-do-transactions-work", "what-is-bsv", "why-do-licenses-matter"], "gated": false}, {"id": "is-bsv-dead", "question": "I read that BSV is dead. Is it?", "category": "60-misconceptions", "tags": ["misconceptions", "network"], "updated": "2026-07-03", "sources": ["https://whatsonchain.com/", "https://bsvblockchain.org/"], "short": "\"Dead\" is checkable, so check rather than trust anyone — including us: the BSV chain's blocks, transactions, and activity are publicly visible in real time on explorers like WhatsOnChain. The network produces blocks continuously, software is actively developed, and applications operate on it. Whether its adoption satisfies any given observer is opinion; whether the network operates is a fact you can verify in one browser tab.", "detail": "Declarations that a blockchain is \"dead\" usually compress one of several very different claims, worth separating:\n\n- **\"The network stopped.\"** False in BSV's case, and directly verifiable — block production and transaction flow are public ([[who-runs-the-bsv-network]]). This is the only meaning of \"dead\" that's purely factual.\n- **\"Fewer venues trade it.\"** Sometimes true at a given moment — listings come and go for commercial and regulatory reasons ([[why-do-exchanges-delist]], [[orange-gateway-mica]]) — but this describes exchanges' shelves, not the network ([[exchange-problems-mean-bsv-problems]]).\n- **\"The price is low.\"** Outside this FAQ's scope by charter ([[no-price-talk]]); in any case, price commentary is not a network status report.\n- **\"Nobody uses/builds on it.\"** A claim about degree, best answered with verifiable activity — on-chain volume, released software ([[how-is-bsv-developed]]), operating applications ([[data-on-chain]]) — rather than assertion in either direction.\n\nThe general skill this FAQ tries to teach applies here in miniature: when you read a dramatic claim about any blockchain, ask which of these four things is actually being asserted, then check the ones that are checkable ([[ecosystem-who-is-who]]).", "refs": ["data-on-chain", "ecosystem-who-is-who", "exchange-problems-mean-bsv-problems", "how-is-bsv-developed", "no-price-talk", "orange-gateway-mica", "who-runs-the-bsv-network", "why-do-exchanges-delist"], "gated": false}, {"id": "no-price-talk", "question": "Why doesn't this FAQ talk about price?", "category": "60-misconceptions", "tags": ["misconceptions", "charter", "price"], "updated": "2026-07-03", "sources": ["https://bsvblockchain.org/"], "short": "Three reasons: price says nothing about how the technology works (this FAQ's actual subject); price commentary from any ecosystem-adjacent source is inherently conflicted and instantly stale; and \"should I buy?\" is a personal financial decision this FAQ is neither licensed nor positioned to advise on. The silence is deliberate policy, not evasion.", "detail": "This repository exists to answer factual questions neutrally ([[ecosystem-who-is-who]]), and price fails every test that the rest of the content mus
