<style>
  :root {

  body {
    font: 16px/1.55 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh;

    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;

<script>
const DATA = [{"id": "bitcoin-vs-bsv", "question": "How is BSV different from Bitcoin (BTC)?", "category": "00-basics", "tags": ["basics", "bitcoin", "comparison"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "BTC and BSV started from the same place in 2009 and use similar core technology. Over time, disagreements split the community into separate networks, and the two now aim at different goals. BTC keeps its blocks — the batches payments are recorded in — deliberately small, and presents itself mainly as something to hold and store value in. BSV removes the limit on block size and presents itself as a network for very large numbers of payments and for data. They are different coins on different chains — you cannot send one to the other.", "detail": "The differences a beginner will actually notice:\n\n| | BTC | BSV |\n|---|---|---|\n| Main aim | A scarce digital asset; settling large amounts | Handling many payments and data at low cost |\n| Block size | Limited (about a few MB) | No fixed limit built into the rules |\n| Typical fee | Changes with how busy the network is; can be dollars | Fractions of a cent ([[what-are-fees]]) |\n| Typical uses | Holding, large settlements | Very small payments, records stored on the chain, applications |\n\nBoth networks rely on the same kind of record-keeping work, called proof-of-work mining. Both keep public records of payments. And both trace back to the same original design paper — which is why people argue over the name. Supporters of each chain say theirs best represents \"Bitcoin.\" This FAQ takes no side in that argument. We use the ticker names (BTC, BSV, BCH) because they are clear, and we describe what each network says it aims to do, without judging.\n\nOne practical warning follows from the two being separate networks: **always check which network you are using before you send.** Coins sent to an address on the wrong chain usually cannot be recovered.", "refs": ["what-are-fees"], "gated": false}, {"id": "what-is-a-wallet", "question": "What is a wallet?", "category": "00-basics", "tags": ["basics", "wallets"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "A wallet is an app that holds the keys to your coins and lets you send and receive them. The coins themselves live on the blockchain — the shared public record. The wallet holds your private keys: the secret codes that prove the coins are yours and let you spend them.", "detail": "The name is slightly misleading. A wallet does not hold coins the way a leather wallet holds cash. Your coins are entries in the public record. What the wallet app keeps safe is your keys — the secret codes that let you, and only you, move those entries.\n\nWallets come in two very different kinds, and the difference matters more than any list of features ([[custodial-vs-own-wallet]]):\n\n- **Self-custody wallets.** You hold the keys, on your own device. Nobody can freeze or move your coins — and nobody can help you if you lose the keys ([[lost-keys-recovery]]).\n- **Custodial services.** An exchange or app holds the keys for you, the way a bank holds your deposits. That is convenient. But your access depends on that company staying in business, properly licensed, and online ([[exchange-closes-my-funds]]).\n\nTwo practical basics: keep your recovery phrase written down, offline, and private ([[keeping-bsv-safe]]). And treat any request to \"verify\" that phrase as a scam — no honest service ever asks for it.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "keeping-bsv-safe", "lost-keys-recovery"], "gated": false}, {"id": "what-is-bsv", "question": "What is BSV?", "category": "00-basics", "tags": ["basics"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "BSV is digital money that works over the internet. You can use it to pay someone directly — like handing over cash, but online — and each payment costs less than a cent. It runs on a shared public record that no single company owns or controls.", "detail": "BSV is two things with the same name: the money itself, and the system that moves it.\n\nThe system is called a blockchain. Think of it as a public record book of payments. Many independent companies keep identical copies of that book and update it together, so nobody can quietly change what's written in it, and no single company can switch it off.\n\nThe money is the coin you keep in a wallet ([[what-is-a-wallet]]) — an app on your phone or computer. Sending BSV is a bit like sending an email: it goes straight to the other person, you pay a tiny fee ([[what-are-fees]]), and there is no bank in the middle.\n\nBSV was built to handle very large numbers of payments at once, which is what keeps each payment cheap. Because payments are so cheap, businesses also use BSV to store records that must not be quietly altered — receipts, time stamps, delivery logs.\n\nNo company owns BSV. Independent businesses process the payments, and a Swiss non-profit, the BSV Association, looks after the system's rules ([[what-is-the-bsv-association]]).", "refs": ["what-are-fees", "what-is-a-wallet", "what-is-the-bsv-association"], "gated": false}, {"id": "custodial-vs-own-wallet", "question": "Keeping coins on an exchange vs. in my own wallet — what's the difference?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "exchanges"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "On an exchange, the company keeps the keys and owes you your balance — much like a bank account. In your own wallet, you keep the keys. Nobody can freeze, lose, or block your coins — and nobody can help you if you lose the keys. You are trading convenience against self-reliance. It is the single most important choice a holder makes.", "detail": "**When a company holds your coins for you (an exchange).** Your coins sit in the company's wallets. Your \"balance\" is their promise to pay you back. That promise is only as good as the company. If it is hacked, goes broke, freezes withdrawals, or cannot get or keep a licence it needs, your access depends on how that situation works out ([[exchange-closes-my-funds]]). In return, you get convenience — password recovery, trading, customer support.\n\n**When you hold your coins yourself.** The keys are on your own device, and the coins answer to you alone. No company failure can touch them — the coins live on the blockchain, not with any business. The price is responsibility. Lose your recovery phrase and no one can restore your access ([[lost-keys-recovery]]). Get tricked by a scammer and no one can reverse the theft ([[keeping-bsv-safe]]).\n\nOne common pattern — we describe it here, we don't prescribe it: use an exchange only for the moment you swap between BSV and regular money, and hold the coins yourself the rest of the time. Whatever you choose, choose knowingly. \"Not your keys, not your coins\" is a simplification, but the uneven risk it points to is real.", "refs": ["exchange-closes-my-funds", "keeping-bsv-safe", "lost-keys-recovery"], "gated": false}, {"id": "keeping-bsv-safe", "question": "How do I keep my BSV safe?", "category": "10-using-bsv", "tags": ["using", "security", "scams"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "Three habits cover most of the risk. First, guard your recovery phrase offline — never type it into websites, apps, or \"support\" chats. That request is always a scam. Second, check the address and the network before you send, because payments cannot be undone. Third, treat any investment offer or \"recovery\" offer you did not ask for as a scam until proven otherwise.", "detail": "Almost all losses come from tricksters, not from the system's locks failing. The same patterns come up again and again:\n\n- **Tricks to get your phrase.** Fake wallet updates, fake support agents, fake \"verify your wallet\" websites — anything that asks for your recovery phrase or private keys. No honest company ever needs them. One rule with zero exceptions: the phrase goes into a wallet app you installed yourself, and nowhere else, ever.\n- **Sending to the wrong place.** Harmful software that secretly swaps the address you copied, addresses that look almost right, or the wrong network ([[sending-bsv-basics]]). Check a few characters at both ends of the address. When the amount matters, send a small test payment first.\n- **Offers that sound too good.** \"Guaranteed returns\", giveaways that promise to double your money, urgent insider tips. Blockchain payments cannot be undone, which makes them a scammer's favorite way to get paid — your skepticism is your refund policy.\n- **Recovery scams.** After any loss, \"recovery services\" appear. Coins lost with their keys cannot be recovered by anyone ([[lost-keys-recovery]]). Paying these services only adds a second loss.\n\nSome bigger choices also lower your risk. Keep any meaningful amount in your own wallet rather than on an exchange ([[custodial-vs-own-wallet]], [[exchange-closes-my-funds]]). Keep the recovery phrase on paper in two places. Use a separate device or a separate user account for large amounts.\n\nIf you are ever unsure whether something is genuine, the safe assumption is that it is not. Check through the official channel you already know — never through the channel that contacted you.", "refs": ["custodial-vs-own-wallet", "exchange-closes-my-funds", "lost-keys-recovery", "sending-bsv-basics"], "gated": false}, {"id": "lost-keys-recovery", "question": "I lost access to my wallet. Can my coins be recovered?", "category": "10-using-bsv", "tags": ["using", "wallets", "security", "recovery"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "It depends on what you lost. Lost the *device* but still have your recovery phrase? Yes — you can get everything back in any compatible wallet. Lost the *recovery phrase and keys* themselves? No. Nobody can recover coins you held yourself — not the wallet maker, not an exchange, not the BSV Association. Lost access to an *exchange account*? Contact the exchange. That works like getting back into any other online account.", "detail": "There are three different situations here. Let's untangle them:\n\n1. **Broken or lost phone, recovery phrase safe.** Your coins were never on the phone. They are on the blockchain, and your phrase recreates your keys. Install a wallet on a new device, restore from the phrase, and you're done.\n2. **Recovery phrase and keys gone.** The coins stay visible in the public record forever, but nothing can move them without the keys. There is no back door. That missing override is exactly what makes holding your own coins trustworthy the rest of the time ([[custodial-vs-own-wallet]]). Anyone who claims they can \"recover\" such coins for a fee is running a scam — and this recovery-scam industry targets people in exactly your situation ([[keeping-bsv-safe]]).\n3. **Locked out of an exchange account.** Your balance there is an entry in the company's own records. Their support team can restore access to the *account* after checking your identity. That is a customer-service matter, not a blockchain one.\n\nPrevention beats all of this. Write the recovery phrase on paper (or metal), keep it in two safe places, and never photograph it or type it into anything online.", "refs": ["custodial-vs-own-wallet", "keeping-bsv-safe"], "gated": false}, {"id": "sending-bsv-basics", "question": "How do I send and receive BSV?", "category": "10-using-bsv", "tags": ["using", "wallets", "transactions"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "To receive: open your wallet and share the address or QR code it shows you. To send: paste or scan the other person's address, enter the amount, and confirm. The payment reaches them in seconds and costs a fraction of a cent. One rule matters most: check the address and the network before you confirm, because blockchain payments cannot be undone.", "detail": "Addresses are long on purpose, so that typing mistakes get caught. But an address that is wrong yet still valid will not be caught — for example, from a bad paste, or from harmful software that swaps what you copied. Good habits: scan QR codes instead of typing, check the first and last few characters after pasting, and send a small test amount first when the sum is significant.\n\n**Payments cannot be reversed.** That is how the system is meant to work, not a missing safety net. No company can pull back a confirmed payment. It is what makes the network trustworthy for the person receiving money — and unforgiving of a sender's mistakes.\n\n**Check the network.** BSV addresses look similar to those of related blockchains ([[bitcoin-vs-bsv]]). Sending BSV to an address on a different network typically loses the coins. Wallets and exchanges label the network — read the label.\n\nSome BSV wallets also let you pay a simple name instead of a long address, using standards such as Paymail. The same rule applies: check before you confirm.", "refs": ["bitcoin-vs-bsv"], "gated": false}, {"id": "what-are-fees", "question": "What are transaction fees, and what do they cost on BSV?", "category": "10-using-bsv", "tags": ["using", "fees", "transactions"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "A fee is a small amount you pay to the companies that process payments, so your payment gets written into the blockchain — a bit like postage on a letter. On BSV, a fee is typically a few satoshis — the smallest unit of the coin, like cents to a dollar — and always well under a cent. Fees stay low because the network's capacity grows with demand, instead of rationing limited space.", "detail": "Fees exist because processing payments costs real money — machines, internet capacity, electricity. The companies that gather payments into blocks are paid through these fees plus newly issued coins.\n\nWhy do fees differ so much between blockchains? It comes down to capacity. On a network where each block has a small fixed size, users compete for limited room, so fees rise when the network is busy. BSV removed that built-in size limit, so room stays plentiful and fees stay flat and tiny no matter how busy it gets. The trade-off: handling very large blocks takes industrial-scale equipment, a cost carried by the network's professional operators.\n\nThe practical result is not just cheaper payments — it is a whole new set of things you can do. When a payment costs 1/100th of a cent, it becomes affordable to pay per article you read, per move in a game, or per record you save. None of that is possible when each payment costs dollars.\n\nNo authority sets the fees. They are worked out in the open market between users and processors — the BSV Association does not set or collect them ([[what-is-the-bsv-association]]).", "refs": ["what-is-the-bsv-association"], "gated": false}, {"id": "where-to-get-bsv", "question": "Where can I get BSV?", "category": "10-using-bsv", "tags": ["using", "exchanges"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "There are three common ways. You can buy BSV on a digital-asset exchange that lists it. You can receive it directly from another person or business — BSV is a payment network, so anyone can send it to your wallet. Or you can earn it by selling goods, services, or data in apps that accept BSV. Which exchanges you can use depends on your country and its rules.", "detail": "**Exchanges** — companies where you swap regular money for coins and back — are the usual way to buy BSV. What is available depends on where you live: an exchange must be licensed for the place you live in, so the list differs between, say, the EU, the UK, and Asia. It also changes over time, as companies gain — or fail to gain — the licenses their markets require. Before you deposit money, check the exchange's approval status for your country. And remember: coins left on an exchange are held by that company, not by you ([[custodial-vs-own-wallet]]).\n\n**Receiving directly** needs no company in the middle at all. Install a wallet ([[what-is-a-wallet]]), share your address or QR code, and anyone can pay you — across borders, in seconds, for a fraction of a cent ([[sending-bsv-basics]]).\n\n**Earning** is increasingly common in BSV apps — small earnings for content, gaming, or data — because tiny payments are practical on this blockchain ([[what-are-fees]]).\n\nIn line with this FAQ's rules, we do not recommend specific companies or discuss whether you should buy at all. This answer explains *how* access works — not *whether* or *where* you should buy.", "refs": ["custodial-vs-own-wallet", "sending-bsv-basics", "what-are-fees", "what-is-a-wallet"], "gated": false}, {"id": "exchange-closes-my-funds", "question": "An exchange holding my coins is closing. What should I do?", "category": "20-exchanges-access", "tags": ["exchanges", "security", "custody"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "Follow the exchange's official instructions, and act promptly. Closures normally come with a set period for taking your coins out — often measured in weeks or a couple of months. Move your coins to a wallet that only you control — like taking your money out of a locker and into your own pocket. Check the address and the network carefully before you send. And be very suspicious of anyone who contacts *you* about the closure — closures attract scammers.", "detail": "A practical order of steps:\n\n1. **Check the news at the source.** Go to the exchange's own website or its verified account — not screenshots or messages sent to you. Scammers use closure panic to set up fake \"fast withdrawal\" websites ([[keeping-bsv-safe]]).\n2. **Get your own wallet first,** if you do not have one. Install a reputable wallet app and keep a copy of its recovery phrase somewhere safe, offline ([[what-is-a-wallet]], [[custodial-vs-own-wallet]]).\n3. **Take your coins out within the window.** Check the address and the network before you confirm ([[sending-bsv-basics]]). Send a small test amount first. If you miss the window, your claim usually moves into a slower legal wind-down process.\n4. **Save your records** — your transaction history and statements — while you can still log in. You may need them for taxes or claims.\n\nWhy do closures happen? Often it is licensing. An exchange that is not granted a required authorization must stop serving that market. An announced wind-down with a withdrawal window is an orderly process, with a clear path for customers. A sudden insolvency — a company collapse — is not. For anyone with money there, that is the practical difference between the two.\n\nOne thing worth repeating: when your coins sit on an exchange, that company holds them for you — which is exactly why this page exists. Coins already in your own wallet are untouched by anything that happens to any exchange.", "refs": ["custodial-vs-own-wallet", "keeping-bsv-safe", "sending-bsv-basics", "what-is-a-wallet"], "gated": false}, {"id": "what-is-the-bsv-association", "question": "What is the BSV Association?", "category": "40-ecosystem", "tags": ["ecosystem", "bsva", "governance"], "updated": "2026-07-07", "sources": ["https://bsvblockchain.org/"], "short": "The BSV Association (BSVA) is a non-profit based in Switzerland that looks after the BSV Blockchain. It maintains the software the network runs on, keeps the technical rulebook, teaches people how to use the technology, and promotes it. It is a caretaker, not an owner: it does not control the network, does not run exchanges, and does not hold anyone's coins.", "detail": "A shared system like BSV needs someone to do the shared housekeeping: keep the software up to date, write down the standards, help with security, and teach newcomers. For BSV, that job belongs to the Association — a non-profit based in Zug, Switzerland.\n\nWhat it does, concretely: it maintains and publishes the software that the payment-processing businesses run; it keeps the technical rulebook; it runs education programs (including the BSV Academy); it supports projects building on BSV; and it speaks for the technology with institutions and governments.\n\nJust as important is what it is *not*: it does not run the network (independent businesses do); it is not a financial company (it holds no customer money and runs no marketplace); and it does not control the blockchain — it publishes the software, but the independent businesses that run the network choose for themselves whether to use it.\n\nWhy this matters to you: when something happens in the news — an exchange closes, an app shuts down — knowing what the Association actually does (and doesn't do) tells you what it could and couldn't have decided.", "refs": [], "gated": false}];
const byId = Object.fromEntries(DATA.map(d => [d.id, d]));

/* ---------- retrieval ---------- */
const STOP = new Set(("a an and are as at be but by can could do does for from has have how i if in is it its "+
  "me my of on or so that the this to was we what when where which who why will with you your").split(" "));
const SYN = { btc:"bitcoin", coins:"coin", cost:"fees", costs:"fees", cheap:"fees", buy:"get",
  bought:"get", sell:"exchange", trade:"exchange", trading:"exchange", closed:"closes",
  shut:"closes", shutdown:"closes", licence:"license", licensed:"license", regulator:"regulates",
  regulators:"regulates", eu:"mica", europe:"mica", iceland:"orange", hacked:"safe", stolen:"safe",
  dead:"dead", scam:"misconception" };
const PRICE = /\b(price|prices|worth|invest|investment|investing|prediction|predictions|pump|moon|profit|profits|go up|going up)\b/i;

function tokens(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s-]/g, " ").split(/\s+/)
    .filter(t => t && !STOP.has(t)).map(t => SYN[t] || t);
}
DATA.forEach(d => {
  d._q = tokens(d.question);
  d._t = d.tags.map(t => t.toLowerCase());
  d._s = tokens(d.short);
  d._b = tokens(d.detail);
});

function search(query) {
  if (PRICE.test(query) && byId["no-price-talk"]) {
    return { top: byId["no-price-talk"], others: [] };
  }
  const qt = tokens(query);
  if (!qt.length) return { top: null, others: [] };
  const scored = DATA.map(d => {
    let s = 0;
    for (const t of qt) {
      if (d._q.includes(t)) s += 4;
      if (d._t.some(tag => tag.includes(t))) s += 3;
      if (d._s.includes(t)) s += 2;
      else if (d._b.includes(t)) s += 1;
      if (d.id.includes(t)) s += 2;
    }
    const ql = query.toLowerCase().replace(/[?.!]/g, "").trim();
    if (ql && d.question.toLowerCase().includes(ql)) s += 8;
    return [s, d];
  }).filter(([s]) => s > 0).sort((a, b) => b[0] - a[0]);
  if (!scored.length || scored[0][0] < 4) return { top: null, others: scored.slice(0, 3).map(x => x[1]) };
  return { top: scored[0][1], others: scored.slice(1, 4).map(x => x[1]) };
}

/* ---------- minimal markdown ---------- */
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function inline(s) {
  return s
    .replace(/\[\[([\w-]+)\]\]/g, (_, id) =>
      byId[id] ? `<button class="chip" data-ask="${id}">${esc(byId[id].question)}</button>` : "")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\[(.+?)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function md(text) {
  const blocks = text.split(/\n\n+/);
  return blocks.map(b => {
    const lines = b.split("\n");
    if (lines.every(l => l.trim().startsWith("- "))) {
      return "<ul>" + lines.map(l => "<li>" + inline(esc(l.trim().slice(2))) + "</li>").join("") + "</ul>";
    }
    if (b.startsWith("### ")) return "<p><strong>" + inline(esc(b.slice(4))) + "</strong></p>";
    return "<p>" + inline(esc(b)) + "</p>";
  }).join("");
}

/* ---------- chat ---------- */
const chat = document.getElementById("chat");
function addRow(cls, html) {
  const row = document.createElement("div");
  row.className = "row " + cls;
  row.innerHTML = `<div class="bubble">${html}</div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function chipRow(docs, label) {
  if (!docs.length) return "";
  const chips = docs.map(d => `<button class="chip" data-ask="${d.id}">${esc(d.question)}</button>`).join("");
  return `<div class="meta">${label}</div><div class="chips">${chips}</div>`;
}

function answer(doc, others) {
  const gated = doc.gated ? '<span class="badge">internal — publication-gated</span>' : "";
  let html = `<h3>${esc(doc.question)}${gated}</h3><p>${inline(esc(doc.short))}</p>`;
  if (doc.detail) html += `<details><summary>More detail</summary>${md(doc.detail)}</details>`;
  if (doc.sources.length) {
    html += `<div class="srcs"><div>Sources</div>` + doc.sources.map(s => {
      const m = s.match(/^https?:/) ? `<a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a>` : esc(s);
      return `<div>· ${m}</div>`;
    }).join("") + `</div>`;
  }
  html += `<div class="meta">As of ${esc(doc.updated)} · category ${esc(doc.category)}</div>`;
  const related = doc.refs.map(id => byId[id]).filter(Boolean)
    .concat(others).filter((d, i, a) => d.id !== doc.id && a.findIndex(x => x.id === d.id) === i).slice(0, 3);
  html += chipRow(related, "Related");
  addRow("bot", html);
}

function noAnswer(near) {
  let html = `<p>I don't have a vetted answer for that yet — and this bot only answers from the reviewed FAQ, so I won't improvise.</p>`;
  html += chipRow(near.length ? near : pick(3), near.length ? "Closest matches" : "You could try");
  addRow("bot", html);
}

function pick(n) {
  const ids = ["what-is-bsv", "exchange-closes-my-funds", "what-is-mica", "what-is-the-bsv-association",
               "keeping-bsv-safe", "orange-gateway-mica"];
  return ids.map(id => byId[id]).filter(Boolean).slice(0, n);
}

function ask(text) {
  addRow("user", esc(text));
  const { top, others } = search(text);
  setTimeout(() => { top ? answer(top, others) : noAnswer(others); }, 120);
}

document.getElementById("form").addEventListener("submit", e => {
  e.preventDefault();
  const q = document.getElementById("q");
  if (q.value.trim()) ask(q.value.trim());
  q.value = "";
});
chat.addEventListener("click", e => {
  const id = e.target.dataset && e.target.dataset.ask;
  if (id && byId[id]) ask(byId[id].question);
});

/* greeting */
addRow("bot",
  `<p><strong>Hi — I answer questions about BSV in plain language.</strong> ` +
  `Every answer is quoted verbatim from a reviewed FAQ (${DATA.length} answers, with sources). ` +
  `If something isn't covered, I'll say so rather than guess. I don't discuss price.</p>` +
  chipRow(pick(4), "Try one of these"));
</script>
</body>
</html>
